version: github_branch_protection_required_v1
repository: Minki-Trader/Project_SpaceSonar_X
source_refs:
  - docs/policies/branch_policy.md
  - https://docs.github.com/repositories/configuring-branches-and-merges-in-your-repository/managing-protected-branches/about-protected-branches
  - https://docs.github.com/en/repositories/configuring-branches-and-merges-in-your-repository/managing-rulesets/available-rules-for-rulesets
settings_authority: github_repository_settings_not_mutated_by_local_patch
target_branch: main
required_settings:
  pull_request_required: true
  required_checks:
    - control-plane-fast
    - unit
    - evidence-graph-full
    - ci-scope-gate
  full_regression:
    workflow: .github/workflows/full-regression.yml
    classifier: foundation/validation/ci_scope_gate.py
    required_for_campaign_closeout_merge: conditional_by_scope_classifier
    trigger: workflow_dispatch
    claim_effect: full_regression_verified_only_after_successful_manual_run
    override:
      path: docs/ci/full_regression_override.yaml
      required_fields:
        - head_sha
        - reason
        - approved_by_user
        - claim_boundary
    partial_ci_allowed_only_for:
      - campaign_local_evidence_or_closeout_without_protected_claim
      - lab_memory_clue_or_negative_memory_without_protected_claim
      - approved_campaign_clue_negative_or_artifact_register_without_protected_claim
    protected_path_scopes:
      - .github/workflows/**
      - AGENTS.md
      - pyproject.toml
      - uv.lock
      - src/spacesonar/control_plane/**
      - foundation/evaluation/**
      - foundation/validation/**
      - foundation/migrations/**
      - foundation/mt5/**
      - docs/agent_control/**
      - docs/policies/**
      - docs/registers/goal_registry.csv
      - docs/registers/wave_registry.csv
      - docs/registers/candidate_registry.csv
      - docs/workspace/**
      - lab/goals/**
      - lab/waves/**
      - lab/templates/**
      - runtime/mt5_attempts/**/attempt_manifest.yaml
      - runtime/mt5_attempts/**/tester_report_receipt.yaml
  squash_merge_only: true
  direct_push: forbidden
  force_push: disabled
  stale_approvals_dismissed: true
  administrator_bypass: emergency_only
validator_effect: local_validator_warns_when_document_absent_or_incomplete
claim_boundary: repository_policy_documented_local_patch_cannot_attest_remote_github_settings
