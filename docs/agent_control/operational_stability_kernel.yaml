version: operational_stability_kernel_v3
purpose: codex_operates_stably_without_routine_pytest_or_full_graph_validation
claim_boundary: operational_control_policy_only_no_runtime_authority_no_economics_pass_no_live_readiness_no_selected_baseline

default_validation_depth: writer_scope_smoke
writer_scope_operating_contract_path: docs/agent_control/writer_scope_operating_contract.yaml
strong_trigger_revision: validation_attempt_budget_v1
global_write_time_guard_path: src/spacesonar/control_plane/writer_contract.py
transaction_write_time_guard_path: src/spacesonar/control_plane/transaction.py

default_command_selection:
  project_validate_default: false
  project_validate_allowed_only_when:
    - campaign_closeout
    - wave_closeout
    - source_of_truth_drift_detected
    - shared_contract_or_validator_semantics_changed
    - explicit_user_requests_project_validate
  preferred_before_project_validate:
    - identify_current_work_item_next_executable_writer_or_probe
    - run_writer_scope_smoke_for_touched_evidence
    - parse_touched_yaml_json_toml_csv
    - compile_touched_python_modules
    - run_routing_or_policy_lint_for_policy_changes
    - run_registry_or_workspace_projection_check_only_when_projection_changed
  rule: project validate is an archive or boundary command, not a routine progress command

routine_inspection_scope:
  current_truth_first:
    - AGENTS.md
    - docs/workspace/workspace_state.yaml
    - docs/agent_control/work_family_registry.yaml
    - docs/agent_control/operational_stability_kernel.yaml
    - docs/agent_control/writer_scope_operating_contract.yaml
    - docs/agent_control/claim_vocabulary.yaml
    - current_work_item
    - touched_source_of_truth_manifests
  exclude_volatile_local_surfaces:
    - .git/**
    - .venv/**
    - .pytest_cache/**
    - .pytest_tmp/**
    - .spacesonar/transactions/**
    - .spacesonar/tx/**
    - runtime/mt5_attempts/*/reports/**
    - runtime/mt5_attempts/*/telemetry/**
    - runtime/packages/*/artifacts/**
    - lab/runs/*/artifacts/**
    - lab/runs/*/reports/**
    - temp_policy_drafts/**
  rule: inspect canonical source-of-truth records, not volatile local workspaces, when deciding operational state
  user_requests_all_folders_all_files_policy:
    interpretation: source_of_truth_and_owner_surface_inventory_with_volatile_excludes
    proof_effect: inventory_only_not_operational_stability_proof
    required_followup: convert_observed_gap_into_owner_writer_policy_or_manifest_rule
  direct_inspection_command_policy:
    preferred_listing: rg --files with exclude patterns for volatile/generated surfaces
    preferred_reads: targeted source-of-truth files and touched owner files
    forbidden_for_operational_truth:
      - unbounded_recursive_workspace_walk
      - recursive_Get-ChildItem_without_volatile_excludes
      - generated_transaction_tree_inventory
      - raw_runtime_artifact_tree_inventory
    reason: volatile generated trees can be stale, missing, huge, or intentionally ignored; they are not proof of operating state

direct_inspection_repair_matrix:
  - surface: boot_kernel
    inspect:
      - AGENTS.md
    gap_repair_target: boot_read_rule_or_claim_guard
  - surface: workspace_active_record
    inspect:
      - docs/workspace/workspace_state.yaml
      - lab/goals/goal_us100_onnx_forward_boundary_v0/next_work_item.yaml
    gap_repair_target: active_pointer_writer_or_next_work_record
  - surface: work_family_routing
    inspect:
      - docs/agent_control/work_family_registry.yaml
      - docs/agent_control/routing_smoke_prompts.yaml
    gap_repair_target: route_rule_or_routing_smoke_fixture
  - surface: canonical_policy
    inspect:
      - docs/agent_control/policy_contract.yaml
      - docs/agent_control/claim_vocabulary.yaml
    gap_repair_target: guard_binding_or_claim_vocabulary
  - surface: operational_kernel
    inspect:
      - docs/agent_control/operational_stability_kernel.yaml
    gap_repair_target: kernel_rule_or_command_gate
  - surface: writer_contract
    inspect:
      - docs/agent_control/writer_scope_operating_contract.yaml
    gap_repair_target: writer_prewrite_or_afterwrite_contract
  - surface: codex_output_format
    inspect:
      - docs/agent_control/codex_operating_format.yaml
      - docs/agent_control/work_item_lite.schema.yaml
    gap_repair_target: required_machine_field_or_closeout_rule
  - surface: repo_skills
    inspect:
      - .agents/skills
    gap_repair_target: selected_skill_guardrail_or_required_output
  - surface: validation_tools
    inspect:
      - foundation/validation
    gap_repair_target: scoped_non_pytest_smoke_or_lint
  - surface: pipeline_writers
    inspect:
      - foundation/pipelines
    gap_repair_target: active_writer_contract_patch_or_legacy_wrapper
  - surface: reusable_research_code
    inspect:
      - foundation/features
      - foundation/labels
      - foundation/training
      - foundation/onnx
      - foundation/mt5
    gap_repair_target: reusable_helper_contract_or_adapter
  - surface: runtime_and_split_contracts
    inspect:
      - foundation/config/mt5_runtime_probe_contract.yaml
      - configs/mt5/period_profiles/split_set_v0_runtime_periods.yaml
      - configs/onnx_lab/split_recipes/split_set_v0.yaml
    gap_repair_target: runtime_or_split_contract_field
  - surface: lab_source_of_truth
    inspect:
      - lab/waves
      - lab/campaigns
      - lab/runs
      - lab/candidates
    gap_repair_target: manifest_receipt_summary_or_reopen_condition
  - surface: registries
    inspect:
      - docs/registers
    gap_repair_target: registry_projection_or_backing_manifest_link
  - surface: runtime_attempts_and_bundles
    inspect:
      - runtime/mt5_attempts
      - runtime/packages
    gap_repair_target: attempt_manifest_bundle_manifest_or_availability_record
  - surface: ci_workflows
    inspect:
      - .github/workflows
    gap_repair_target: non_pytest_smoke_or_manual_archive_gate

direct_inspection_repair_rule: direct inspection ends by patching an owner writer, source-of-truth manifest, policy, skill, or scoped lint; it must not end as a repeated folder-scan report

writer_contract_enforcement:
  new_or_changed_writer_without_contract: fail_writer_local_before_broad_validation
  legacy_writer_reuse_without_contract: patch_or_wrap_before_reuse_for_wave02_plus_or_lower_claim_to_legacy_read_only
  broad_validation_finds_writer_gap: move_invariant_into_writer_parser_adapter_manifest_or_lint_before_repeating_broad_validation
  active_wave02_requirement: any Wave02 writer that mutates manifests, receipts, registries, workspace_state, bundles, attempts, or closeouts must emit writer-scope fields and after-write self-check
  required_writer_version_field: writer_contract_version
  required_writer_preflight_field: writer_preflight_gate
  required_validation_attempt_budget_field: validation_attempt_budget
  global_write_time_guard_required: true
  transaction_stage_yaml_enforces_strict_writer_surfaces: true
  default_gap_effect: investigation_in_progress_until_owner_rule_is_patched
  forbidden_gap_response:
    - run_pytest_to_discover_owner_surface
    - run_project_validate_to_discover_missing_writer_outputs
    - run_broad_hash_resync_before_writer_final_byte_check
    - repeat_full_folder_scan_without_policy_or_writer_change
    - repeat_writer_scope_smoke_after_two_attempts_without_blocker_or_escalation_record

validation_attempt_budget:
  max_writer_scope_attempts: 2
  allowed_attempts:
    - initial_writer_scope_smoke_after_write
    - one_repair_then_same_scope_resmoke
  third_attempt_effect: stop_and_record_blocker_or_escalation_gate
  broad_validation_resets_budget: false
  repeated_same_failure_effect: move_invariant_into_writer_parser_adapter_manifest_or_scoped_lint_before_any_repeat
  rule: a writer may run the touched-surface smoke once, make one owner repair, and run the same smoke once more; a third pass is not progress without a blocker or command-intent gate

write_time_guarded_surfaces:
  guard_module: src/spacesonar/control_plane/writer_contract.py
  transaction_hook: ControlPlaneTransaction.stage_yaml
  strict_writer_filenames:
    - next_work_item.yaml
    - campaign_closeout.yaml
    - wave_closeout.yaml
    - candidate_summary.yaml
    - attempt_manifest.yaml
  strict_writer_patterns:
    - lab/campaigns/**/*_summary.yaml
    - lab/campaigns/**/summary.yaml
  fail_effect: fail_before_mutation
  proof_effect: construction_guard_not_runtime_or_economics_claim

active_record_authority:
  authoritative_pointer_fields:
    - active_goal
    - active_wave
    - active_campaign
    - active_work_item
    - current_claim_boundary
    - next_action
    - unresolved_blockers
  current_truth_record_rule: active_work_item.path points to the only next_work_item record used for next action routing
  summary_counts_role: cumulative_reference_not_active_pointer
  rule: summary_counts may retain older campaign evidence and must not decide current status, next action, candidate state, or claim boundary without matching active_work_item and next_work_item evidence
  writer_rule: every writer that mutates workspace_state.yaml must align workspace active pointers, next_work_item.yaml, goal_manifest.yaml, campaign_manifest.yaml, and goal_registry.csv
  default_smoke: "python foundation/validation/active_pointer_smoke.py"

writer_scope_operating_contract:
  contract_path: docs/agent_control/writer_scope_operating_contract.yaml
  required_for:
    - new_or_changed_pipeline_writers
    - work_item_records
    - campaign_open_records
    - campaign_closeout_records
    - wave_boundary_records
    - runtime_attempt_writers
    - workspace_state_mutations
  required_record_fields:
    - writer_contract_version
    - primary_family
    - primary_skill
    - source_of_truth_paths
    - writer_owned_outputs
    - validation_depth
    - non_pytest_smokes
    - skipped_broad_validations
    - broad_validation_escalation_reason
    - writer_scope_self_check
    - claim_boundary
    - forbidden_claims
    - unresolved_blockers_or_none
    - next_action_or_reopen_condition
  rule: writer_local_contract_is_the_default_stability_mechanism_not_pytest

experiment_first_loop:
  applies_when:
    - user_asks_progress
    - user_asks_experiment
    - active_work_item_has_next_executable_probe_or_writer
  required_order:
    - read_current_truth
    - identify_next_executable_writer_or_probe
    - repair_missing_repo_controlled_glue_if_needed
    - execute_or_materialize_the_thinnest_real_step
    - write_manifest_receipt_hash_claim_boundary
    - run_touched_surface_smoke_only_if_it_changes_the_claim
  forbidden_response_shape:
    - validation_only_loop_without_executing_pending_writer_or_probe
    - ci_or_full_graph_wait_before_attempting_repo_controlled_next_step
    - folder_inventory_report_without_source_of_truth_contract_change

growth_policy:
  tests_may_grow_without_slowing_default_loop: true
  reason: default loop does not execute pytest
  default_time_driver: touched_writer_or_probe_scope
  escalation_time_driver: boundary_or_shared_contract_claim_scope

hash_and_line_ending_policy:
  hash_identity_mode: bytes_from_final_written_file
  yaml_identity_mode: no_aliases_no_anchors_utf8_lf
  writer_rule: compute hash after final newline and encoding are fixed
  yaml_writer_rule: use NoAliasDumper or shared dump_yaml helpers; deep-copy reused nested mappings before assigning them into multiple output branches
  proof_rule: do not repair hash drift by broad resync before checking the touched manifest or receipt writer

broad_validation_command_intent_gate:
  applies_to:
    - pytest
    - full_regression_workflow
    - evidence_graph_full_workflow
    - active_record_validator_full_graph
    - spacesonar_project_validate_full
    - broad_hash_resync
    - global_registry_regeneration
  allowed_only_when_one_of:
    - campaign_closeout
    - wave_closeout
    - source_of_truth_drift_detected_by_writer_scope_check
    - shared_contract_or_validator_semantics_changed
    - dependency_lock_or_workflow_changed
    - protected_claim_surface_changed
    - explicit_user_request_for_that_broad_command
  required_record_before_running:
    - command
    - allowed_reason
    - owner_surface
    - source_of_truth_paths
    - why_writer_scope_smoke_is_insufficient
    - expected_claim_effect
    - smaller_checks_already_attempted_or_not_applicable_reason
  default_if_missing_record: do_not_run_broad_command_choose_writer_scope_step

start_order:
  - read_boot_kernel
  - read_workspace_state_if_current_truth_matters
  - read_work_family_registry_for_non_trivial_work
  - read_writer_scope_operating_contract_when_stability_or_writer_rules_matter
  - classify_primary_family_and_primary_skill
  - identify_owned_source_of_truth_paths
  - identify_writer_or_manifest_responsible_for_the_change
  - construct_writer_preflight_gate_and_validation_attempt_budget
  - mutate_smallest_owned_surface
  - record_claim_boundary_and_provenance_effect
  - run_non_pytest_smoke_for_touched_surfaces
  - defer_global_reconciliation_until_boundary_or_drift

required_before_action:
  branch_worktree_fit: true
  preserve_user_changes: true
  primary_family_count: 1
  primary_skill_count: 1
  source_of_truth_paths_named: true
  claim_boundary_named: true
  forbidden_claims_named_when_status_changes: true
  registry_rows_treated_as_indexes: true

strong_writer_guards:
  manifests:
    - id_chain_present_when_applicable
    - repo_relative_paths_only
    - claim_boundary_present
    - forbidden_claims_present_for_runtime_or_candidate_surfaces
    - missing_evidence_and_next_action_present_when_incomplete
  receipts:
    - input_paths_hashes_or_reason_present
    - output_paths_hashes_or_reason_present
    - producer_command_present
    - environment_or_lock_reference_present_when_reproducibility_matters
  writer_path_identity:
    - write_and_hash_the_same_filesystem_path
    - after_write_existence_check_before_artifact_ref
    - failure_path_still_writes_summary_receipt_claim_boundary
    - missing_optional_local_artifact_records_availability_instead_of_crashing
    - machine_yaml_has_no_aliases_or_anchors
  registries:
    - generated_or_index_only
    - never_source_of_truth_without_manifest
  runtime:
    - proxy_model_bearing_requires_onnx_ea_mt5_follow_through_plan
    - runtime_claim_requires_mt5_contract_evidence
    - main_mode_fallback_is_diagnostic_only

forbidden_default_commands:
  - pytest
  - full_regression_workflow
  - evidence_graph_full_workflow
  - active_record_validator_full_graph
  - spacesonar_project_validate_full
  - spacesonar_cli_project_validate_as_progress_default
  - broad_hash_resync
  - global_registry_regeneration
  - whole_tree_scan_as_proof
  - volatile_local_tree_scan_as_proof

allowed_non_pytest_smokes:
  - parse_touched_yaml_json_toml_csv
  - compile_touched_python_modules
  - import_touched_python_module_when_safe
  - active_pointer_smoke
  - run_writer_scope_evidence_smoke_for_touched_runs
  - run_policy_or_routing_lint_when_policy_or_routing_changed
  - run_writer_scope_contract_lint_for_touched_writer_records
  - run_repository_setting_check_when_git_policy_changed
  - run_registry_projection_check_when_registry_projection_changed
  - inspect_manifest_receipt_lineage_hash_fields_for_touched_records
  - scan_touched_yaml_for_alias_tokens
  - claim_vocabulary_ascii_structure_lint

hard_enforcement_points:
  before_broad_validation_command:
    - broad_validation_command_intent_gate_record_exists
    - allowed_reason_matches_kernel_escalation_reason
    - writer_scope_smoke_insufficiency_named
    - expected_claim_effect_named
  writer_before_write:
    - writer_contract_version_declared
    - writer_preflight_gate_passed_before_mutation
    - source_of_truth_path_declared
    - primary_family_and_skill_declared
    - validation_attempt_budget_declared
    - id_chain_present_or_not_applicable_reason
    - claim_boundary_declared
    - forbidden_claims_declared_for_runtime_candidate_or_closeout_surfaces
    - missing_evidence_declared_when_incomplete
    - next_action_or_reopen_condition_declared_when_incomplete
  writer_after_write:
    - all_declared_source_of_truth_paths_exist
    - active_pointer_smoke_passes_when_workspace_or_next_work_changes
    - receipt_and_summary_files_exist_before_artifact_ref
    - repo_relative_paths_only
    - hashes_match_written_outputs_or_hash_only_availability_declared
    - registry_rows_link_to_manifest_not_to_claim_authority
    - machine_yaml_has_no_aliases_or_anchors
    - validation_attempt_budget_observed_and_not_exceeded
    - dirty_worktree_effect_recorded_if_reproducibility_matters
  boundary_before_main_push:
    - no_unresolved_writer_errors
    - control_plane_state_names_current_source_of_truth
    - active_record_status_does_not_exceed_manifest_evidence
    - protected_claims_absent_or_evidence_bound
    - unresolved_blockers_and_reopen_conditions_named

ci_scope_gate_policy:
  default_behavior: non_blocking_boundary_classifier
  never_default:
    - require_pytest_for_main_push
    - require_full_regression_for_protected_path_change
    - require_evidence_graph_full_for_routine_run_loop
  may_recommend_boundary_review_when:
    - protected_path_changed
    - protected_claim_text_changed
    - unscoped_path_changed
  archive_full_regression_requires:
    - explicit_user_or_archive_reason
    - manual_workflow_acknowledgement
    - claim_boundary_recorded

writer_scope_commands:
  run_evidence: "python -m spacesonar.cli project writer-smoke --run-refs <repo-relative-run_refs.csv> --campaign-id <campaign_id> --summary <repo-relative-summary.yaml> --pre-runtime"
  direct_validator: "python foundation/validation/writer_scope_evidence_smoke.py --run-id <run_id> --pre-runtime"
  machine_yaml_identity_lint: "python foundation/validation/machine_yaml_identity_lint.py --path <repo-relative-yaml>"
  writer_scope_contract_lint: "python foundation/validation/writer_scope_contract_lint.py --path <repo-relative-yaml-or-json>"
  targeted_artifact_hash_refresh: "python foundation/validation/refresh_artifact_registry_hashes.py --path <repo-relative-artifact> --write"

transaction_validation_policy:
  lifecycle_default_validation_depth: writer_scope_smoke
  lifecycle_must_not_call_by_default:
    - control_plane_validator_full
    - active_record_validator_full
    - pytest
  lifecycle_boundary_escalation_only:
    - campaign_closeout
    - wave_closeout
    - protected_claim_surface_changed
    - source_of_truth_drift_detected

escalate_to_manual_boundary_validation_when:
  - campaign_closeout
  - wave_closeout
  - source_of_truth_drift_detected
  - shared_contract_or_validator_semantics_changed
  - dependency_lock_or_workflow_changed
  - protected_claim_surface_changed
  - user_explicitly_requests_full_validation

protected_claim_surfaces:
  - selected_baseline
  - runtime_authority
  - economics_pass
  - live_readiness
  - production_deployment
  - handoff_complete
  - reviewed_verified_pass
  - goal_achieve

operator_failure_modes_to_avoid:
  - running_full_tests_before_identifying_owned_surface
  - running_project_validate_as_a_progress_substitute
  - validation_only_loop_when_executable_work_is_pending
  - using_folder_inventory_as_substitute_for_policy_reasoning
  - scanning_volatile_local_workspaces_as_operational_evidence
  - closing_missing_adapter_without_smallest_repo_controlled_attempt
  - pushing_run_fragments_as_boundary_evidence
  - updating_registry_without_manifest_or_receipt_backing
  - claiming_stability_from_ci_success_only
  - repairing_hash_newline_drift_with_global_resync_first
  - letting_yaml_aliases_enter_machine_records
  - letting_locale_mojibake_enter_claim_vocabulary
  - running_forbidden_broad_command_without_command_intent_gate_record
  - writing_new_pipeline_without_writer_scope_operating_contract_fields

machine_output_fields:
  - writer_contract_version
  - primary_family
  - primary_skill
  - touched_source_of_truth_paths
  - validation_depth
  - non_pytest_smokes
  - skipped_broad_validations
  - broad_validation_escalation_reason
  - writer_preflight_gate
  - validation_attempt_budget
  - writer_scope_self_check
  - claim_boundary
  - unresolved_blockers
  - next_action
