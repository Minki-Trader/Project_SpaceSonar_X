version: operational_stability_kernel_v1
purpose: codex_operates_stably_without_routine_pytest_or_full_graph_validation
claim_boundary: operational_control_policy_only_no_runtime_authority_no_economics_pass_no_live_readiness_no_selected_baseline

default_validation_depth: writer_scope_smoke

routine_inspection_scope:
  current_truth_first:
    - AGENTS.md
    - docs/workspace/workspace_state.yaml
    - docs/agent_control/work_family_registry.yaml
    - docs/agent_control/operational_stability_kernel.yaml
    - current_work_item
    - touched_source_of_truth_manifests
  exclude_volatile_local_surfaces:
    - .git/**
    - .venv/**
    - .pytest_cache/**
    - .pytest_tmp/**
    - .spacesonar/transactions/**
    - .spacesonar/tx/**
    - runtime/mt5_attempts/*/reports/**
    - runtime/mt5_attempts/*/telemetry/**
    - runtime/packages/*/artifacts/**
    - lab/runs/*/artifacts/**
    - lab/runs/*/reports/**
    - temp_policy_drafts/**
  rule: inspect canonical source-of-truth records, not volatile local workspaces, when deciding operational state

experiment_first_loop:
  applies_when:
    - user_asks_progress
    - user_asks_experiment
    - active_work_item_has_next_executable_probe_or_writer
  required_order:
    - read_current_truth
    - identify_next_executable_writer_or_probe
    - repair_missing_repo_controlled_glue_if_needed
    - execute_or_materialize_the_thinnest_real_step
    - write_manifest_receipt_hash_claim_boundary
    - run_touched_surface_smoke_only_if_it_changes_the_claim
  forbidden_response_shape:
    - validation_only_loop_without_executing_pending_writer_or_probe
    - ci_or_full_graph_wait_before_attempting_repo_controlled_next_step
    - folder_inventory_report_without_source_of_truth_contract_change

growth_policy:
  tests_may_grow_without_slowing_default_loop: true
  reason: default loop does not execute pytest
  default_time_driver: touched_writer_or_probe_scope
  escalation_time_driver: boundary_or_shared_contract_claim_scope

hash_and_line_ending_policy:
  hash_identity_mode: bytes_from_final_written_file
  writer_rule: compute hash after final newline and encoding are fixed
  proof_rule: do not repair hash drift by broad resync before checking the touched manifest or receipt writer

start_order:
  - read_boot_kernel
  - read_workspace_state_if_current_truth_matters
  - read_work_family_registry_for_non_trivial_work
  - classify_primary_family_and_primary_skill
  - identify_owned_source_of_truth_paths
  - identify_writer_or_manifest_responsible_for_the_change
  - mutate_smallest_owned_surface
  - record_claim_boundary_and_provenance_effect
  - run_non_pytest_smoke_for_touched_surfaces
  - defer_global_reconciliation_until_boundary_or_drift

required_before_action:
  branch_worktree_fit: true
  preserve_user_changes: true
  primary_family_count: 1
  primary_skill_count: 1
  source_of_truth_paths_named: true
  claim_boundary_named: true
  forbidden_claims_named_when_status_changes: true
  registry_rows_treated_as_indexes: true

strong_writer_guards:
  manifests:
    - id_chain_present_when_applicable
    - repo_relative_paths_only
    - claim_boundary_present
    - forbidden_claims_present_for_runtime_or_candidate_surfaces
    - missing_evidence_and_next_action_present_when_incomplete
  receipts:
    - input_paths_hashes_or_reason_present
    - output_paths_hashes_or_reason_present
    - producer_command_present
    - environment_or_lock_reference_present_when_reproducibility_matters
  registries:
    - generated_or_index_only
    - never_source_of_truth_without_manifest
  runtime:
    - proxy_model_bearing_requires_onnx_ea_mt5_follow_through_plan
    - runtime_claim_requires_mt5_contract_evidence
    - main_mode_fallback_is_diagnostic_only

forbidden_default_commands:
  - pytest
  - full_regression_workflow
  - evidence_graph_full_workflow
  - active_record_validator_full_graph
  - spacesonar_project_validate_full
  - broad_hash_resync
  - global_registry_regeneration
  - whole_tree_scan_as_proof
  - volatile_local_tree_scan_as_proof

allowed_non_pytest_smokes:
  - parse_touched_yaml_json_toml_csv
  - compile_touched_python_modules
  - import_touched_python_module_when_safe
  - run_writer_scope_evidence_smoke_for_touched_runs
  - run_policy_or_routing_lint_when_policy_or_routing_changed
  - run_repository_setting_check_when_git_policy_changed
  - run_registry_projection_check_when_registry_projection_changed
  - inspect_manifest_receipt_lineage_hash_fields_for_touched_records

hard_enforcement_points:
  writer_before_write:
    - source_of_truth_path_declared
    - primary_family_and_skill_declared
    - id_chain_present_or_not_applicable_reason
    - claim_boundary_declared
    - forbidden_claims_declared_for_runtime_candidate_or_closeout_surfaces
    - missing_evidence_declared_when_incomplete
    - next_action_or_reopen_condition_declared_when_incomplete
  writer_after_write:
    - all_declared_source_of_truth_paths_exist
    - repo_relative_paths_only
    - hashes_match_written_outputs_or_hash_only_availability_declared
    - registry_rows_link_to_manifest_not_to_claim_authority
    - dirty_worktree_effect_recorded_if_reproducibility_matters
  boundary_before_main_push:
    - no_unresolved_writer_errors
    - control_plane_state_names_current_source_of_truth
    - active_record_status_does_not_exceed_manifest_evidence
    - protected_claims_absent_or_evidence_bound
    - unresolved_blockers_and_reopen_conditions_named

ci_scope_gate_policy:
  default_behavior: non_blocking_boundary_classifier
  never_default:
    - require_pytest_for_main_push
    - require_full_regression_for_protected_path_change
    - require_evidence_graph_full_for_routine_run_loop
  may_recommend_boundary_review_when:
    - protected_path_changed
    - protected_claim_text_changed
    - unscoped_path_changed
  archive_full_regression_requires:
    - explicit_user_or_archive_reason
    - manual_workflow_acknowledgement
    - claim_boundary_recorded

writer_scope_commands:
  run_evidence: "python -m spacesonar.cli project writer-smoke --run-refs <repo-relative-run_refs.csv> --campaign-id <campaign_id> --summary <repo-relative-summary.yaml> --pre-runtime"
  direct_validator: "python foundation/validation/writer_scope_evidence_smoke.py --run-id <run_id> --pre-runtime"

transaction_validation_policy:
  lifecycle_default_validation_depth: writer_scope_smoke
  lifecycle_must_not_call_by_default:
    - control_plane_validator_full
    - active_record_validator_full
    - pytest
  lifecycle_boundary_escalation_only:
    - campaign_closeout
    - wave_closeout
    - protected_claim_surface_changed
    - source_of_truth_drift_detected

escalate_to_manual_boundary_validation_when:
  - campaign_closeout
  - wave_closeout
  - source_of_truth_drift_detected
  - shared_contract_or_validator_semantics_changed
  - dependency_lock_or_workflow_changed
  - protected_claim_surface_changed
  - user_explicitly_requests_full_validation

protected_claim_surfaces:
  - selected_baseline
  - runtime_authority
  - economics_pass
  - live_readiness
  - production_deployment
  - handoff_complete
  - reviewed_verified_pass
  - goal_achieve

operator_failure_modes_to_avoid:
  - running_full_tests_before_identifying_owned_surface
  - validation_only_loop_when_executable_work_is_pending
  - using_folder_inventory_as_substitute_for_policy_reasoning
  - scanning_volatile_local_workspaces_as_operational_evidence
  - closing_missing_adapter_without_smallest_repo_controlled_attempt
  - pushing_run_fragments_as_boundary_evidence
  - updating_registry_without_manifest_or_receipt_backing
  - claiming_stability_from_ci_success_only
  - repairing_hash_newline_drift_with_global_resync_first

machine_output_fields:
  - primary_family
  - primary_skill
  - touched_source_of_truth_paths
  - validation_depth
  - non_pytest_smokes
  - skipped_broad_validations
  - claim_boundary
  - unresolved_blockers
  - next_action
