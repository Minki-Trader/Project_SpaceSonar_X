version: onnx_lab_skill_receipt_schema_v1
purpose: "Compact receipt schema for repo-scoped skills in ONNX lab work."

required_common_fields:
  - receipt_id
  - skill_name
  - trigger_source
  - claim_surface
  - branch_worktree_fit
  - branch_action
  - inputs_read
  - outputs_or_decisions
  - provenance
  - storage_contract_effect
  - required_gate_coverage
  - critical_skills_not_selected
  - not_selected_claim_effect
  - claim_boundary
  - forbidden_claims

conditional_required_fields:
  failure_disposition:
    required_when:
      - result_judgment_is_blocked
      - result_judgment_is_deferred
      - result_judgment_is_invalid
      - result_judgment_is_discarded
      - tool_adapter_converter_parser_runtime_or_data_support_gap_blocks_progress
    required_fields:
      - status
      - attempt_before_disposition
      - failure_reproduction_or_attempt_blocker
      - exact_failing_layer
      - bounded_repair_or_fallback_attempt_or_attempt_blocker
      - evidence_paths
      - remaining_blocker
      - reopen_condition
      - claim_effect
    rule: "A nonworking path remains investigation_in_progress until Codex identifies why it failed, reproduces or bounds the failing layer, tries the smallest credible repo-controlled repair/adapter/fallback, and records evidence plus reopen condition. Missing repo-controlled adapter/glue is implementation work before blocked, deferred, invalid, or discarded."

skill_specific:
  spacesonar-workspace-state-sync:
    required_fields:
      - changed_surfaces
      - register_effect
      - archive_boundary_effect

  spacesonar-data-integrity:
    required_fields:
      - time_axis
      - feature_label_boundary
      - split_boundary
      - leakage_risk
      - integrity_judgment

  spacesonar-runtime-parity:
    required_fields:
      - shared_contract
      - parity_check
      - parity_identity
      - runtime_claim_boundary

  spacesonar-artifact-lineage:
    required_fields:
      - source_inputs
      - artifact_paths
      - artifact_hashes
      - source_of_truth_paths
      - regeneration_commands
      - availability
      - lineage_judgment

  spacesonar-task-force-review:
    required_fields:
      - selected_agents
      - role_modes
      - spawned_agent_ids
      - opinion_classification
      - allowed_claim_effect

  spacesonar-run-evidence-system:
    required_fields:
      - storage_contract
      - required_gate_coverage
      - runtime_learning_probe_decision
      - missing_evidence

archive_policy:
  status: "Legacy routing and external-review archive surfaces were deleted by user request."
  claim_effect: "Absent archive material cannot create current advice, review evidence, prior-evidence claims, or operating inheritance."
