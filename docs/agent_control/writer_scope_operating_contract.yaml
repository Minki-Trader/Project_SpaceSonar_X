version: writer_scope_operating_contract_v3
strong_trigger_revision: validation_attempt_budget_v1
purpose: machine_contract_for_experiment_first_operation_without_validation_or_review_loops_as_progress
claim_boundary: control_plane_policy_only_no_runtime_authority_no_economics_pass_no_live_readiness_no_selected_baseline
global_write_time_guard: src/spacesonar/control_plane/writer_contract.py

applies_to:
  - new_or_changed_pipeline_writers
  - work_item_records
  - campaign_open_records
  - campaign_closeout_records
  - wave_open_records
  - wave_closeout_records
  - runtime_attempt_writers
  - artifact_registry_touch_points
  - workspace_state_mutations

default_validation_depth: writer_scope_smoke
default_progress_unit: next_executable_experiment_writer_or_probe

progress_semantics:
  validation_is_progress: false
  inspection_is_progress: false
  registry_projection_is_proof: false
  default_progress_unit: next_executable_experiment_writer_or_probe
  proof_rule: manifest_receipt_hash_before_registry_projection
  generic_review_gates_after_experiment_first: forbidden_unless_blocker_requires_user_choice
  forbidden_success_progress_classes:
    - validation_only
    - review_only
    - inspection_only
  campaign_open:
    meaningful_multi_axis_surface_required: true
    default_proxy_spec_count: 18
    tiny_validation_samples_allowed_by_default: false
    tiny_validation_sample_exceptions:
      - explicit_budget_blocker
      - explicit_environment_blocker

required_writer_record_fields:
  - writer_contract_version
  - primary_family
  - primary_skill
  - progress_class
  - progress_effect
  - next_executable_action
  - experiment_or_boundary_effect
  - source_of_truth_paths
  - writer_owned_outputs
  - validation_depth
  - non_pytest_smokes
  - skipped_broad_validations
  - broad_validation_escalation_reason
  - writer_preflight_gate
  - validation_attempt_budget
  - writer_scope_self_check
  - claim_boundary
  - forbidden_claims
  - unresolved_blockers_or_none
  - next_action_or_reopen_condition

writer_owned_output_classes:
  manifest:
    required:
      - id_chain_or_not_applicable_reason
      - repo_relative_source_of_truth_path
      - claim_boundary
      - missing_evidence_when_incomplete
      - next_action_or_reopen_condition_when_incomplete
  receipt:
    required:
      - producer_command
      - source_inputs
      - output_paths
      - hashes_or_reason_unavailable
      - environment_or_lock_reference_when_reproducibility_matters
  summary:
    required:
      - result_status_or_judgment
      - evidence_paths
      - validation_depth
      - non_pytest_smokes
      - skipped_broad_validations
      - claim_boundary
  registry_projection:
    required:
      - backing_manifest_or_receipt_path
      - backing_hash_or_availability_reason
      - index_only_claim

writer_before_write_gate:
  fail_before_mutation_when_missing:
    - writer_contract_version
    - source_of_truth_paths
    - primary_family
    - primary_skill
    - progress_class
    - progress_effect
    - next_executable_action
    - experiment_or_boundary_effect
    - validation_depth
    - non_pytest_smokes
    - skipped_broad_validations
    - broad_validation_escalation_reason
    - validation_attempt_budget
    - claim_boundary
    - forbidden_claims_for_candidate_runtime_or_closeout_surfaces
    - expected_writer_owned_outputs
  required_preflight_record:
    field: writer_preflight_gate
    status: passed_before_mutation
    checked_before_mutation: true
    fail_closed_when_missing: true
    required_fields_named:
      - source_of_truth_paths
      - writer_owned_outputs
      - primary_family
      - primary_skill
      - progress_class
      - progress_effect
      - next_executable_action
      - experiment_or_boundary_effect
      - validation_attempt_budget
      - claim_boundary
      - forbidden_claims
      - next_action_or_reopen_condition
  rule: if_the_writer_cannot_name_what_it_owns_it_must_fail_before_mutation_and_must_not_use_pytest_or_project_validate_to_discover_it

validation_attempt_budget:
  default:
    max_writer_scope_attempts: 2
    allowed_attempts:
      - initial_writer_scope_smoke_after_write
      - one_repair_then_same_scope_resmoke
    third_attempt_effect: stop_and_record_blocker_or_escalation_gate
    broad_validation_resets_budget: false
    repeated_same_failure_effect: move_invariant_into_writer_parser_adapter_manifest_or_scoped_lint_before_any_repeat
  required_record_fields:
    - max_writer_scope_attempts
    - allowed_attempts
    - third_attempt_effect
    - broad_validation_resets_budget
    - repeated_same_failure_effect
  rule: writer_scope_validation_must_not_become_a_loop_initial_check_plus_one_repair_check_then_fail_closed_or_escalate_with_recorded_reason

machine_enforcement:
  new_writer_records:
    required_contract_version: writer_scope_operating_contract_v3
    required_write_time_guard: src/spacesonar/control_plane/writer_contract.py
    missing_required_field_effect: fail_writer_local_before_mutation
    missing_preflight_gate_effect: fail_writer_local_before_mutation
    missing_validation_attempt_budget_effect: fail_writer_local_before_mutation
    broad_validation_substitution_allowed: false
    validation_review_inspection_success_state_effect: fail_writer_local_before_mutation
  legacy_writer_reuse:
    applies_to: legacy_pipeline_or_runner_reused_for_wave02_plus_or_active_work
    allowed_only_after:
      - patch_writer_to_emit_required_writer_record_fields
      - wrap_writer_with_source_of_truth_summary_receipt_hash_claim_boundary_check
      - record_lowered_claim_boundary_for_read_only_legacy_reference
    missing_contract_effect: do_not_escalate_to_pytest_patch_or_wrap_first
  summary_or_closeout_records:
    required:
      - writer_contract_version
      - progress_class
      - progress_effect
      - next_executable_action
      - experiment_or_boundary_effect
      - source_of_truth_paths
      - writer_owned_outputs
      - validation_depth
      - non_pytest_smokes
      - skipped_broad_validations
      - broad_validation_escalation_reason
      - writer_preflight_gate
      - validation_attempt_budget
      - writer_scope_self_check
      - claim_boundary
      - next_action_or_reopen_condition
    recurring_closeout_gates:
      campaign_closeout:
        - kpi_ledger_triad_or_missing_source_record
        - intent_behavior_parity_or_reopen_probe
        - minimum_reconciliation_attempt_for_proxy_mt5_divergence
        - coherent_main_boundary_integration_required
      bounded_synthesis_closeout:
        - kpi_ledger_triad_with_stage_kind_special_mixing
        - intent_behavior_parity_or_reopen_probe
        - ingredient_lifecycle_and_mix_depth_policy_check
        - coherent_main_boundary_integration_required
  failure_policy:
    if_writer_cannot_write_proof_record: write_failure_summary_with_missing_evidence_reopen_condition_or_fail_before_registry_projection
    if_broad_validation_finds_missing_writer_output: move_check_into_writer_before_repeating_broad_validation
    if_hash_or_line_ending_drift_repeats: hash_after_final_bytes_and_use_targeted_registry_update_only
    if_writer_scope_smoke_fails_twice: stop_repeating_and_record_blocker_or_command_intent_gate
    if_same_gap_reappears: add_preflight_or_scoped_lint_before_next_run

write_time_guarded_surfaces:
  transaction_stage_yaml_enforced_by: src/spacesonar/control_plane/transaction.py
  strict_writer_filenames:
    - next_work_item.yaml
    - workspace_state.yaml
    - wave_allocation.yaml
    - campaign_manifest.yaml
    - campaign_closeout.yaml
    - wave_closeout.yaml
    - first_batch_run_specs_manifest.yaml
    - proxy_execution_summary.yaml
    - candidate_summary.yaml
    - attempt_manifest.yaml
  strict_writer_patterns:
    - lab/campaigns/**/*_summary.yaml
    - lab/campaigns/**/summary.yaml
  rule: strict_writer_surfaces_fail_before_mutation_if_writer_contract_fields_are_missing_or_pending

writer_after_write_gate:
  fail_writer_local_when_missing:
    - declared_source_of_truth_paths_exist
    - proof_bearing_summaries_or_receipts_exist_before_artifact_ref
    - hashes_match_final_written_bytes_or_availability_reason_exists
    - repo_relative_paths_only
    - machine_yaml_has_no_aliases_or_anchors
    - claim_boundary_does_not_exceed_evidence
    - validation_attempt_budget_observed_and_not_exceeded
  workspace_mutation_extra:
    - workspace_state_active_pointer_aligned
    - next_work_item_aligned
    - goal_manifest_aligned
    - campaign_manifest_aligned_when_active_campaign_changes
    - goal_registry_row_aligned

non_pytest_smoke_map:
  python_writer_changed:
    - compile_touched_python_modules
    - import_touched_module_when_safe
  control_yaml_changed:
    - parse_touched_yaml
    - machine_yaml_identity_lint
    - writer_scope_contract_lint_for_touched_writer_records
  workspace_or_next_work_changed:
    - active_pointer_smoke
    - targeted_artifact_hash_check_for_registered_touched_records
  registry_projection_changed:
    - projection_check_for_touched_registry_only
    - targeted_artifact_hash_check_for_touched_paths
  run_evidence_changed:
    - writer_scope_evidence_smoke_for_touched_run_or_campaign
  routing_or_skill_changed:
    - parse_touched_yaml_or_frontmatter
    - routing_contract_lint_or_policy_lint_when_route_semantics_changed
    - writer_scope_contract_lint_when_writer_contract_semantics_change
  runtime_attempt_changed:
    - parse_attempt_manifest
    - check_terminal_summary_telemetry_summary_tester_report_receipt_availability

forbidden_default_commands:
  - pytest
  - full_regression_workflow
  - evidence_graph_full_workflow
  - active_record_validator_full_graph
  - spacesonar_project_validate_full
  - spacesonar_cli_project_validate_as_progress_default
  - broad_hash_resync
  - global_registry_regeneration
  - whole_tree_scan_as_proof
  - volatile_local_tree_scan_as_proof

broad_validation_command_intent_gate:
  allowed_only_when_one_of:
    - campaign_or_wave_boundary_with_recorded_archive_escalation_reason
    - source_of_truth_drift_detected_by_writer_scope_check
    - shared_contract_or_validator_semantics_changed
    - dependency_lock_or_workflow_changed
    - protected_claim_surface_changed
    - explicit_user_request_for_that_broad_command
  required_record_before_running:
    - command
    - allowed_reason
    - owner_surface
    - source_of_truth_paths
    - why_writer_scope_smoke_is_insufficient
    - expected_claim_effect
    - smaller_checks_already_attempted_or_not_applicable_reason
  default_if_missing_record: do_not_run_broad_command_choose_writer_scope_step

inspection_contract:
  source_tree_inventory_role: orientation_only_not_proof
  inspect_first:
    - boot_kernel
    - workspace_state
    - active_next_work_item
    - work_family_registry
    - operational_stability_kernel
    - this_contract
    - touched_owner_files
  do_not_use_as_operating_truth:
    - generated_transaction_trees
    - raw_runtime_report_or_telemetry_trees
    - package_artifact_trees
    - repeated_recursive_folder_passes
  rule: convert_each_observed_gap_into_a_writer_policy_manifest_or_contract_rule_before_running_broad_validation

stable_loop_order:
  - read_current_truth
  - choose_one_primary_family_and_skill
  - name_writer_owned_source_of_truth_paths
  - build_writer_preflight_gate_and_validation_attempt_budget
  - execute_or_edit_the_thinnest_owned_step
  - write_manifest_receipt_summary_hash_claim_boundary
  - run_non_pytest_smokes_for_touched_surfaces
  - escalate_broad_validation_only_with_command_intent_gate_record

boundary_main_integration_policy:
  required_at:
    - campaign_closeout
    - bounded_synthesis_closeout
  not_required_mid_campaign: true
  required_before_main_reflection:
    - coherent_source_of_truth_records
    - kpi_ledger_triad_or_missing_source_record
    - intent_behavior_parity_or_reopen_probe
    - minimum_reconciliation_attempt_for_proxy_mt5_divergence
    - claim_boundary_no_protected_claims
  claim_effect: main_integration_boundary_only_no_runtime_authority_no_economics_pass_no_goal_achieve

machine_output_fields:
  - progress_class
  - progress_effect
  - next_executable_action
  - experiment_or_boundary_effect
  - validation_depth
  - non_pytest_smokes
  - skipped_broad_validations
  - broad_validation_escalation_reason
  - writer_preflight_gate
  - validation_attempt_budget
  - writer_scope_self_check
  - source_of_truth_paths
  - claim_boundary
  - unresolved_blockers_or_none
  - next_action_or_reopen_condition
