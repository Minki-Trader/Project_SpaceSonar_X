version: onnx_lab_operating_format_v1
purpose: "Define compact lifecycle records for non-trivial SpaceSonar X ONNX lab work."

does_not_replace:
  - docs/registers/run_registry.csv
  - docs/registers/artifact_registry.csv
  - docs/registers/candidate_registry.csv
  - lab/runs/<run_id>/run_manifest.json
  - runtime/packages/<bundle_id>/experiment_bundle.json

lifecycle:
  - phase: intake
    required_outputs:
      - user_intent
      - current_truth_need
      - primary_family_candidate
      - claim_boundary

  - phase: routing
    required_outputs:
      - primary_family
      - primary_skill
      - support_skills
      - required_gates
      - verification_profile
      - claim_boundary
      - forbidden_claims

  - phase: design_or_plan
    required_outputs:
      - hypothesis_or_objective
      - changed_variables
      - control_variables
      - success_failure_invalid_conditions
      - stop_conditions
      - storage_contract
      - runtime_learning_probe_decision

  - phase: execution
    required_when:
      - command_runs
      - artifact_generation
      - model_training
      - onnx_export
      - mt5_probe
    required_outputs:
      - command
      - environment_summary
      - source_inputs
      - output_paths
      - hashes_or_reason_unavailable
      - source_of_truth_paths
      - heavy_artifact_policy

  - phase: evidence
    required_outputs:
      - run_manifest_or_not_applicable
      - artifact_lineage_or_not_applicable
      - metrics_or_not_applicable
      - registry_updates_or_not_applicable
      - required_gate_coverage
      - missing_evidence

  - phase: validation_decision
    required_outputs:
      - validation_depth
      - non_pytest_smokes
      - skipped_broad_validations
      - broad_validation_escalation_reason
      - writer_scope_self_check
      - source_of_truth_paths_checked
    rule: "Routine work uses writer-scope smoke. Pytest, project validate, full active-record graph, full evidence graph, broad hash resync, or global registry regeneration require a recorded boundary, drift, shared-contract, protected-claim, dependency/workflow, or explicit-user-request reason before execution."

  - phase: closeout
    required_outputs:
      - result_judgment
      - failure_disposition_or_not_applicable
      - required_gate_coverage
      - final_claim_guard
      - next_action
      - forbidden_claims_respected

artifact_roles:
  raw_evidence:
    examples:
      - lab/runs/<run_id>/reports/**
      - runtime/mt5_attempts/<attempt_id>/reports/**
      - runtime/mt5_attempts/<attempt_id>/telemetry/**
    rule: "Raw evidence proves what actually ran."

  machine_readable:
    examples:
      - lab/runs/<run_id>/run_manifest.json
      - lab/runs/<run_id>/experiment_receipt.yaml
      - lab/runs/<run_id>/artifact_lineage.json
      - lab/runs/<run_id>/metrics.json
      - runtime/packages/<bundle_id>/experiment_bundle.json
      - runtime/mt5_attempts/<attempt_id>/attempt_manifest.yaml
    rule: "Machine records are used by gates and audits."

  human_readable:
    examples:
      - README.md
      - lab/candidates/<candidate_id>/summary.md
      - runtime/packages/<bundle_id>/README.md
    rule: "Human reports must not contradict machine records."

completion_rule:
  completed_requires:
    - acceptance_criteria_passed_or_not_applicable_with_reason
    - required_gates_executed_or_not_applicable_with_reason
    - artifact_lineage_connected_or_bounded
    - final_claim_guard_passed
    - storage_contract_satisfied
  blocked_deferred_invalid_discarded_for_failure_requires:
    - failure_disposition_gate_recorded
    - failure_reproduction_or_reproduction_blocker
    - exact_failing_layer
    - bounded_repair_or_fallback_attempt_or_attempt_blocker
    - evidence_path
    - remaining_blocker
    - reopen_condition
  explanation_only_closeout_rule: "Diagnosis text, advisory notes, missing-helper observations, or agent consensus do not count as repair attempts."
  nonworking_result_rule: "When an operation does not work, first determine why, reproduce or bound the failing layer, and attempt the smallest repo-controlled fix, adapter, or fallback. Only a recorded failed attempt or narrow attempt blocker can support blocked, deferred, invalid, or discarded."
  attempt_first_posture: "A failing path stays investigation_in_progress until Codex has made the smallest credible repo-controlled attempt or recorded a narrow attempt blocker. Deferred/discarded is a post-attempt judgment, not an initial reaction."
  active_attempt_rule: "If execution or mutation is within the current task and the missing layer is repo-controlled, Codex must try the smallest concrete repair/fallback before using blocked, deferred, invalid, or discarded."
  no_pytest_stability_rule: "Stable operation is writer-contract-first. A writer must record source-of-truth paths, writer-owned outputs, validation_depth, non_pytest_smokes, skipped_broad_validations, broad_validation_escalation_reason, writer_scope_self_check, claim_boundary, and next action; broad validation cannot substitute for these fields."
  not_yet_attempted_claim_effect: investigation_in_progress
  failure_disposition_requires_all_before_blocked_deferred_invalid_or_discarded:
    - failure_reproduction
    - exact_failing_layer
    - bounded_repair_or_fallback_attempt_or_attempt_blocker
    - evidence_path
    - remaining_blocker
    - reopen_condition
  repo_controlled_support_gap_rule: "Missing converter, conversion adapter, export adapter, EA adapter, parser, runner, report parser, or runtime glue requires the smallest explicit repo-controlled adapter/fallback build-and-test attempt before blocked, deferred, invalid, or discarded."
  diagnosis_only_tokens:
    - cannot
    - unsupported
    - not_available
    - missing_adapter
    - missing_glue
