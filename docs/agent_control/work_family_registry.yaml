version: onnx_lab_work_family_registry_v1
mode: id_based_onnx_lab
purpose: "Route non-trivial SpaceSonar X ONNX lab work without loading legacy governance."

global_rules:
  primary_family_count: 1
  primary_skill_count: 1
  support_skill_policy: "select only skills that change execution, evidence, or closeout"
  branch_worktree_policy: "derive branch_worktree_fit and branch_action from docs/policies/branch_policy.md before mutation"
  max_threads_policy: "max_threads is capacity only; actual agent allocation must be phase-driven and justified"
  high_cost_implicit_invocation_policy: "High-cost review/forensics/attribution skills default to explicit invocation; behavior smoke may tune this later without treating smoke as reviewed/pass evidence."
  subagent_advice_policy: "Sub-agent output is advisory only. Parent Codex must source-check it against repo source-of-truth files, selected skills, workspace state, and user constraints before adoption."
  subagent_conflict_policy: "If agent advice conflicts with project definitions, reject or rewrite the advice; do not follow it verbatim."
  research_campaign_axis_policy: "Research campaigns are unexplored multi-axis discovery. They must not be feature-only, label-only, model-only, threshold-only, or repair-only programs; declare target/label, feature/input, model/training, decision, and eval/runtime companion axes."
  repair_carryover_policy: "Do not relabel unfinished repair or candidate-local perturbation as a fresh hypothesis in the next campaign/wave without a recorded new surface, divergence, or prevention-memory question."
  failure_disposition_policy: "Cannot/unsupported/unavailable is diagnosis, not disposition. Before blocked, deferred, invalid, or discarded status, record failure reproduction, exact failing layer, at least one bounded repair or fallback attempt, evidence path, remaining blocker, and reopen condition; if the repair attempt itself is impossible, record the attempt blocker."
  attempt_before_disposition_policy: "If the current task permits execution or mutation and the failure is repo-controlled, Codex must attempt the smallest concrete repair, adapter, parser, fixture, compile, command, runtime probe, or fallback before any blocked/deferred/invalid/discarded disposition."
  adapter_blocker_policy: "Missing converter/conversion-adapter/export/EA/parser/runtime support is diagnostic only. If the missing piece is under repo/control, build and test the smallest adapter or fallback before disposition; 'adapter absent' alone is never a blocker. If a conversion adapter does not exist yet, create the smallest explicit translation layer needed to test the hypothesis unless a narrow exception applies. Exceptions are user secrets, unavailable external state, destructive/unsafe action, or policy violation, and must be recorded as attempt blockers."
  execution_weight_policy: "Attempt-first is not heavy-first. Start with the thinnest execution that answers the current question, then expand validation only when the path is real, shared contracts changed, source-of-truth indexes drift, boundary closeout is happening, or a protected runtime/economics/handoff claim is being made."
  disposition_record_policy: "Any blocked, deferred, invalid, or discarded result caused by a failing tool, adapter, runtime, parser, converter, data path, or support gap must include a failure_disposition record. Without that record, lower the claim to investigation_in_progress."
  bounded_synthesis_policy: "Bounded synthesis is previous-material-only campaign work. It cannot set next wave/campaign direction; use mix-2 then mix-3 by default, allow mix-4 only with a recorded reason, and forbid mix-5+ without policy change."
  agent_role_modes:
    - scout
    - design
    - preflight
    - adversarial_check
    - evidence_check
    - runtime_check
    - closeout_check
  internal_record_style: "english_friendly_id_oriented_machine_readable"
  final_answer_filter:
    - spacesonar-answer-clarity
    - spacesonar-claim-discipline
  cold_start_rule: "read AGENTS.md first; read this registry only for non-trivial routing"
  legacy_archive_deleted:
    status: deleted_by_user_request
    claim_effect: unavailable_no_inheritance
    recovery_rule: "Do not route to legacy archive material unless the user restores it and explicitly asks for archive recovery."

verification_profiles:
  information_only:
    claim_surface: "answer_or_status_only"
    extra_gates: []
  design_only:
    claim_surface: "plan_or_design_no_execution"
    extra_gates:
      - final_claim_guard
  code_change:
    claim_surface: "code_mutation"
    extra_gates:
      - test_or_syntax_check
      - failure_disposition_record_if_blocked_deferred_invalid_or_discarded
      - final_claim_guard
  lab_experiment:
    claim_surface: "python_or_research_run"
    extra_gates:
      - run_manifest
      - experiment_receipt
      - storage_contract_check
      - runtime_learning_probe_decision
      - proxy_runtime_parity_decision
      - failure_disposition_record_if_blocked_deferred_invalid_or_discarded
      - result_judgment
      - final_claim_guard
  onnx_bundle:
    claim_surface: "onnx_export_schema_bundle_or_parity"
    extra_gates:
      - onnx_export_smoke
      - feature_schema_contract
      - bundle_integrity_hash
      - failure_disposition_record_if_blocked_deferred_invalid_or_discarded
      - final_claim_guard
  runtime:
    claim_surface: "mt5_runtime_economics_or_handoff"
    extra_gates:
      - runtime_learning_probe_decision
      - mt5_runtime_probe_contract_audit
      - proxy_runtime_parity_record
      - runtime_surface_contract
      - failure_disposition_record_if_blocked_deferred_invalid_or_discarded
      - final_claim_guard
  policy_skill_governance:
    claim_surface: "policy_skill_agent_or_control_plane_change"
    extra_gates:
      - branch_worktree_fit
      - provenance_capture
      - skill_metadata_lint
      - storage_contract_check
      - routing_smoke_eval
      - dry_run_receipt
      - encoding_check
      - final_claim_guard
  cleanup_archive:
    claim_surface: "delete_move_archive_or_restore"
    extra_gates:
      - target_path_safety
      - archive_or_boundary_record
      - final_claim_guard

