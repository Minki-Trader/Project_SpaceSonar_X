  artifact_lineage:
    primary_skill: spacesonar-artifact-lineage
    support_skills:
      - spacesonar-environment-reproducibility
      - spacesonar-claim-discipline
    required_gates:
      - lineage_record
      - final_claim_guard

  cleanup_archive:
    primary_skill: spacesonar-artifact-lineage
    support_skills:
      - spacesonar-workflow-drift-guard
      - spacesonar-claim-discipline
    required_gates:
      - target_path_safety
      - archive_or_boundary_record
      - final_claim_guard

  publish_handoff:
    primary_skill: spacesonar-artifact-lineage
    support_skills:
      - spacesonar-runtime-parity
      - spacesonar-environment-reproducibility
      - spacesonar-claim-discipline
    required_gates:
      - handoff_surface_check
      - final_claim_guard

claim_boundaries:
  exploration_no_gate: true
  storage_identity:
    durable_identity_policy: repo_relative_paths_only
    absolute_paths: local_context_only
    registry_rows_are_proof: false
    source_of_truth_rule: "Each run, bundle, candidate, campaign, and MT5 attempt must name one source-of-truth manifest."
  legacy_inheritance_forbidden:
    - winner
    - selected_baseline
    - promotion_history
    - runtime_authority
    - live_readiness
    - goal_achieve
    - economics_pass
  strong_claims_require_matching_evidence:
    - runtime_authority
    - operating_promotion
    - economics_pass
    - materialization_ready
    - handoff_complete
    - selected_baseline
    - reviewed
    - verified
    - pass
