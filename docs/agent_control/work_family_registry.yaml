version: onnx_lab_work_family_registry_v1
mode: id_based_onnx_lab
purpose: "Route non-trivial SpaceSonar X ONNX lab work without loading legacy governance."

global_rules:
  primary_family_count: 1
  primary_skill_count: 1
  support_skill_policy: "select only skills that change execution, evidence, or closeout"
  branch_worktree_policy: "derive branch_worktree_fit and branch_action from docs/policies/branch_policy.md before mutation"
  max_threads_policy: "max_threads is capacity only; Task Force/sub-agent spawning is disabled by docs/policies/agent_allocation_policy.md"
  high_cost_implicit_invocation_policy: "High-cost review/forensics/attribution skills default to explicit invocation; behavior smoke may tune this later without treating smoke as reviewed/pass evidence."
  subagent_advice_policy: "Disabled. Do not spawn Task Force/sub-agents or use agent advice as active review evidence."
  subagent_conflict_policy: "Historical agent advice is archive evidence only and cannot override source-of-truth files, selected skills, workspace state, or user constraints."
  operational_stability_kernel: "docs/agent_control/operational_stability_kernel.yaml"
  default_validation_depth: writer_scope_smoke
  research_campaign_axis_policy: "Research campaigns are unexplored multi-axis discovery. They must not be feature-only, label-only, model-only, threshold-only, or repair-only programs; declare target/label, feature/input, model/training, decision, and eval/runtime companion axes."
  repair_carryover_policy: "Do not relabel unfinished repair or candidate-local perturbation as a fresh hypothesis in the next campaign/wave without a recorded new surface, divergence, or prevention-memory question."
  failure_disposition_policy: "Cannot/unsupported/unavailable is diagnosis, not disposition. Before blocked, deferred, invalid, or discarded status, record failure reproduction, exact failing layer, at least one bounded repair or fallback attempt, evidence path, remaining blocker, and reopen condition; if the repair attempt itself is impossible, record the attempt blocker."
  attempt_before_disposition_policy: "If the current task permits execution or mutation and the failure is repo-controlled, Codex must attempt the smallest concrete repair, adapter, parser, fixture, compile, command, runtime probe, or fallback before any blocked/deferred/invalid/discarded disposition."
  adapter_blocker_policy: "Missing converter/conversion-adapter/export/EA/parser/runtime support is diagnostic only. If the missing piece is under repo/control, build and test the smallest adapter or fallback before disposition; 'adapter absent' alone is never a blocker. If a conversion adapter does not exist yet, create the smallest explicit translation layer needed to test the hypothesis unless a narrow exception applies. Exceptions are user secrets, unavailable external state, destructive/unsafe action, or policy violation, and must be recorded as attempt blockers."
  execution_weight_policy: "Attempt-first is not heavy-first. Start with the thinnest execution that answers the current question. Use docs/agent_control/operational_stability_kernel.yaml before broad validation. Main-push defaults are fast smoke plus writer/source-of-truth receipts; boundary review is source-of-truth scoped by default, and full-regression is an explicit archive exception for source-of-truth drift, broad shared-contract/dependency changes, or protected runtime/economics/handoff/live/readiness/review claims."
  project_validate_policy: "python -m spacesonar.cli project validate is not a progress-loop default. Use writer-smoke, touched parse/compile/import, routing/policy lint, registry/workspace projection checks, or the next executable writer/probe first; project validate is boundary, source-of-truth drift, shared validator/contract semantics, or explicit user-request only."
  operator_progress_policy: "When the user asks for progress or experiments and the active work item has a repo-controlled executable writer, materializer, runner, probe, or adapter path, route to that next concrete step before any validation-only loop."
  direct_inspection_policy: "Direct inspection means targeted source-of-truth and owner-file reads. Use rg --files with volatile/generated excludes for listings; do not use unbounded recursive workspace walks or generated transaction/runtime artifact tree inventories as operational proof."
  writer_local_contract_policy: "When broad validation catches a repeated issue, move the invariant into the responsible writer, parser, adapter, or manifest contract. Writers must write proof summaries/receipts before artifact_ref/hash/registry projection; missing optional raw artifacts become explicit availability records."
  volatile_surface_policy: "Do not treat .pytest_tmp, .spacesonar transactions, runtime telemetry/report trees, package artifact trees, or lab run artifact/report trees as current-truth scan targets; use their manifests, receipts, summaries, and hashes."
  disposition_record_policy: "Any blocked, deferred, invalid, or discarded result caused by a failing tool, adapter, runtime, parser, converter, data path, or support gap must include a failure_disposition record. Without that record, lower the claim to investigation_in_progress."
  bounded_synthesis_policy: "Bounded synthesis is previous-material-only campaign work. It cannot set next wave/campaign direction; use mix-2 then mix-3 by default, allow mix-4 only with a recorded reason, and forbid mix-5+ without policy change."
  agent_role_modes: []
  internal_record_style: "english_friendly_id_oriented_machine_readable"
  final_answer_filter:
    - spacesonar-answer-clarity
    - spacesonar-claim-discipline
  cold_start_rule: "read AGENTS.md first; read this registry only for non-trivial routing"
  legacy_archive_deleted:
    status: deleted_by_user_request
    claim_effect: unavailable_no_inheritance
    recovery_rule: "Do not route to legacy archive material unless the user restores it and explicitly asks for archive recovery."

global_guards:
  - spacesonar-answer-clarity
  - spacesonar-claim-discipline

explicit_skill_limits:
  information_only: 1
  code_change: 2
  experiment: 3
  runtime: 3
  governance: 3
  exceeding_three_requires: why_not_smaller

verification_profiles:
  information_only:
    claim_surface: "answer_or_status_only"
    extra_gates: []
  design_only:
    claim_surface: "plan_or_design_no_execution"
    extra_gates:
      - final_claim_guard
  code_change:
    claim_surface: "code_mutation"
    extra_gates:
      - test_or_syntax_check
      - failure_disposition_record_if_blocked_deferred_invalid_or_discarded
      - final_claim_guard
  lab_experiment:
    claim_surface: "python_or_research_run"
    extra_gates:
      - run_manifest
      - experiment_receipt
      - storage_contract_check
      - runtime_learning_probe_decision
      - proxy_runtime_parity_decision
      - failure_disposition_record_if_blocked_deferred_invalid_or_discarded
      - result_judgment
      - final_claim_guard
  onnx_bundle:
    claim_surface: "onnx_export_schema_bundle_or_parity"
    extra_gates:
      - onnx_export_smoke
      - feature_schema_contract
      - bundle_integrity_hash
      - failure_disposition_record_if_blocked_deferred_invalid_or_discarded
      - final_claim_guard
  runtime:
    claim_surface: "mt5_runtime_economics_or_handoff"
    extra_gates:
      - runtime_learning_probe_decision
      - mt5_runtime_probe_contract_audit
      - proxy_runtime_parity_record
      - runtime_surface_contract
      - failure_disposition_record_if_blocked_deferred_invalid_or_discarded
      - final_claim_guard
  policy_skill_governance:
    claim_surface: "policy_skill_agent_or_control_plane_change"
    extra_gates:
      - branch_worktree_fit
      - provenance_capture
      - skill_metadata_lint
      - storage_contract_check
      - routing_smoke_eval
      - dry_run_receipt
      - encoding_check
      - final_claim_guard
  cleanup_archive:
    claim_surface: "delete_move_archive_or_restore"
    extra_gates:
      - target_path_safety
      - archive_or_boundary_record
      - final_claim_guard
  artifact_lineage:
    claim_surface: "artifact_identity_or_lineage_change"
    extra_gates:
      - lineage_record
      - storage_contract_check
      - final_claim_guard
  publish_handoff:
    claim_surface: "handoff_preflight_no_handoff_complete_claim"
    extra_gates:
      - handoff_surface_check
      - storage_contract_check
      - final_claim_guard

route_guard_sets:
  answer_only:
    claim_effect: information_only_no_mutation
  protected_claim_read_only:
    claim_effect: protected_claim_discussion_only_no_assertion
  runtime_read_only:
    claim_effect: runtime_truth_read_only_no_execution
  protected_candidate_model:
    claim_effect: candidate_or_model_protected_claim_requires_matching_evidence
  protected_runtime:
    claim_effect: runtime_or_economics_protected_claim_requires_matching_evidence
  safe_default:
    claim_effect: low_confidence_safe_verification_no_stronger_claim
  workspace_state:
    claim_effect: workspace_projection_guard
  runtime_research:
    claim_effect: runtime_research_no_runtime_authority
  research:
    claim_effect: research_or_code_change_no_operating_claim
  artifact_identity:
    claim_effect: artifact_identity_guard
  handoff_preflight:
    claim_effect: handoff_preflight_no_handoff_complete
  governance:
    claim_effect: policy_skill_control_plane_guard

work_families:
  information_only:
    routing_mode: automatic
    primary_skill: spacesonar-session-bootstrap
    support_skills: []
    required_gates: []

  workspace_state_sync:
    routing_mode: automatic
    primary_skill: spacesonar-workspace-state-sync
    support_skills:
      - spacesonar-session-bootstrap
    required_gates:
      - workspace_state_consistency
      - final_claim_guard

  policy_skill_governance:
    routing_mode: automatic
    primary_skill: spacesonar-work-item-router
    support_skills:
      - spacesonar-architecture-guard
      - spacesonar-evidence-provenance
    required_gates:
      - branch_worktree_fit
      - provenance_capture
      - skill_metadata_lint
      - storage_contract_check
      - routing_smoke_eval
      - dry_run_receipt
      - encoding_check
      - final_claim_guard

  code_edit:
    routing_mode: automatic
    primary_skill: spacesonar-code-change-quality
    support_skills:
      - spacesonar-reference-scout
    required_gates:
      - test_or_syntax_check
      - final_claim_guard

  code_refactor:
    routing_mode: automatic
    primary_skill: spacesonar-code-change-quality
    support_skills:
      - spacesonar-architecture-guard
    required_gates:
      - ownership_boundary_check
      - test_or_syntax_check
      - final_claim_guard

  data_feature_build:
    routing_mode: automatic
    primary_skill: spacesonar-data-integrity
    support_skills:
      - spacesonar-evidence-provenance
    required_gates:
      - time_axis_check
      - feature_label_boundary_check
      - feature_schema_contract
      - final_claim_guard

  experiment_design:
    routing_mode: automatic
    primary_skill: spacesonar-experiment-design
    support_skills:
      - spacesonar-data-integrity
      - spacesonar-performance-attribution
    required_gates:
      - design_contract_check
      - exploration_coverage_check
      - campaign_proxy_runtime_parity_policy
      - final_claim_guard

  synthesis_campaign:
    routing_mode: automatic
    primary_skill: spacesonar-experiment-design
    support_skills:
      - spacesonar-evidence-provenance
      - spacesonar-performance-attribution
    required_gates:
      - synthesis_source_lineage_check
      - ingredient_card_lineage_check
      - mix_depth_policy_check
      - next_wave_influence_block
      - campaign_proxy_runtime_parity_policy
      - final_claim_guard

  model_training:
    routing_mode: automatic
    primary_skill: spacesonar-model-validation
    support_skills:
      - spacesonar-data-integrity
      - spacesonar-evidence-provenance
    required_gates:
      - split_boundary_check
      - selection_bias_check
      - run_manifest
      - experiment_receipt
      - storage_contract_check
      - runtime_learning_probe_decision
      - proxy_runtime_parity_decision
      - final_claim_guard

  onnx_export_parity:
    routing_mode: automatic
    primary_skill: spacesonar-runtime-evidence
    support_skills:
      - spacesonar-evidence-provenance
    required_gates:
      - onnx_export_smoke
      - python_onnx_parity
      - proxy_runtime_parity_record
      - bundle_integrity_hash
      - final_claim_guard

  candidate_evaluation:
    routing_mode: automatic
    primary_skill: spacesonar-result-judgment
    support_skills:
      - spacesonar-performance-attribution
      - spacesonar-model-validation
    required_gates:
      - metrics_source_check
      - candidate_registry_update
      - final_claim_guard

  bundle_materialization:
    routing_mode: automatic
    primary_skill: spacesonar-evidence-provenance
    support_skills:
      - spacesonar-runtime-evidence
    required_gates:
      - experiment_bundle_manifest
      - bundle_integrity_hash
      - final_claim_guard

  runtime_probe:
    routing_mode: automatic
    primary_skill: spacesonar-runtime-evidence
    support_skills:
      - spacesonar-evidence-provenance
      - spacesonar-performance-attribution
    required_gates:
      - runtime_learning_probe_decision
      - mt5_runtime_probe_contract_audit
      - proxy_runtime_parity_record
      - runtime_surface_contract
      - final_claim_guard

  artifact_lineage:
    routing_mode: automatic
    primary_skill: spacesonar-evidence-provenance
    support_skills: []
    required_gates:
      - lineage_record
      - final_claim_guard

  cleanup_archive:
    routing_mode: automatic
    primary_skill: spacesonar-evidence-provenance
    support_skills:
      - spacesonar-workflow-drift-guard
    required_gates:
      - target_path_safety
      - archive_or_boundary_record
      - final_claim_guard

  publish_handoff:
    routing_mode: automatic
    primary_skill: spacesonar-evidence-provenance
    support_skills:
      - spacesonar-runtime-evidence
    required_gates:
      - handoff_surface_check
      - final_claim_guard

claim_boundaries:
  exploration_no_gate: true
  storage_identity:
    durable_identity_policy: repo_relative_paths_only
    absolute_paths: local_context_only
    registry_rows_are_proof: false
    source_of_truth_rule: "Each run, bundle, candidate, campaign, and MT5 attempt must name one source-of-truth manifest."
  legacy_inheritance_forbidden:
    - winner
    - selected_baseline
    - promotion_history
    - runtime_authority
    - live_readiness
    - goal_achieve
    - economics_pass
  strong_claims_require_matching_evidence:
    - runtime_authority
    - operating_promotion
    - economics_pass
    - materialization_ready
    - handoff_complete
    - selected_baseline
    - reviewed
    - verified
    - pass
