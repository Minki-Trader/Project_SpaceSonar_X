  bundle_materialization:
    primary_skill: spacesonar-artifact-lineage
    support_skills:
      - spacesonar-runtime-parity
      - spacesonar-environment-reproducibility
      - spacesonar-claim-discipline
    required_gates:
      - experiment_bundle_manifest
      - bundle_integrity_hash
      - final_claim_guard

  runtime_probe:
    primary_skill: spacesonar-runtime-parity
    support_skills:
      - spacesonar-backtest-forensics
      - spacesonar-run-evidence-system
      - spacesonar-result-judgment
