version: onnx_lab_work_item_schema_v1
new_work_item_required_version: onnx_lab_work_item_v1
legacy_routing_record_policy: deleted_no_inheritance

required_top_level:
  - work_item_id
  - created_at_utc
  - user_request
  - current_truth
  - branch_worktree
  - work_classification
  - interpreted_scope
  - verification_profile
  - acceptance_criteria
  - work_plan
  - skill_routing
  - agent_allocation
  - execution_provenance
  - storage_contract
  - evidence_contract
  - gates
  - runtime_learning_probe_decision
  - failure_disposition
  - final_claim_policy

scope_units_allowed:
  - file
  - document
  - run
  - surface
  - sweep
  - campaign
  - synthesis_campaign
  - candidate
  - bundle
  - code_module
  - metric_row
  - registry_row
  - artifact
  - report
  - policy
  - skill
  - runtime_attempt

execution_layers_allowed:
  - read_only
  - document_edit
  - code_edit
  - python_execution
  - onnx_export
  - parity_check
  - mt5_execution
  - metric_recording
  - registry_update
  - cleanup
  - publish

verification_profile_ids_allowed:
  - information_only
  - design_only
  - code_change
  - lab_experiment
  - onnx_bundle
  - runtime
  - policy_skill_governance
  - cleanup_archive

branch_actions_allowed:
  - keep_current_branch
  - switch_existing_branch
  - switch_to_main
  - create_codex_branch
  - create_user_requested_branch
  - create_or_use_worktree
  - block_and_report_mismatch

agent_role_modes_allowed: []

fields:
  work_item_id:
    required: true
    rule: "Stable id for this unit of work."

  current_truth:
    required_fields:
      - truth_sources_read
      - deleted_legacy_boundary
      - current_claim_boundary

  branch_worktree:
    required_fields:
      - current_branch
      - requested_branch
      - branch_worktree_fit
      - branch_action
      - policy_reference
      - mismatch_claim_effect
    rule: "Derive branch_worktree_fit and branch_action from docs/policies/branch_policy.md before mutation."

  work_classification:
    required_fields:
      - primary_family
      - detected_families
      - touched_surfaces
      - mutation_intent
      - execution_intent

  interpreted_scope:
    required_fields:
      - target_surfaces
      - scope_units
      - execution_layers
      - mutation_policy
      - evidence_layers
      - reduction_policy
      - exploration_coverage_check
      - repair_carryover_check
      - neighborhood_perturbation_scope
      - bounded_synthesis_scope
      - mix_depth_policy
      - next_wave_influence_check
      - claim_boundary
    rule: "Research campaigns must not be feature-only, label-only, model-only, threshold-only, or repair-only programs. Repair carryover must not be relabeled as a fresh hypothesis without a recorded new surface, divergence, or prevention-memory question. Neighborhood perturbation must stay within meaningful adjacent variables. Bounded synthesis must be previous-material-only and cannot direct the next wave/campaign."

  verification_profile:
    required_fields:
      - profile_id
      - claim_surface
      - trigger_sources
      - protected_claims
      - required_evidence
      - gates_not_run_with_reason
      - stop_conditions

  evidence_contract:
    required_fields:
      - raw_evidence
      - machine_readable
      - human_readable
      - generated_or_ignored_artifacts
      - source_of_truth_paths
      - registry_rows
      - heavy_artifact_policy

  storage_contract:
    required_fields:
      - durable_identity_policy
      - run_root
      - manifest_path
      - receipt_path
      - lineage_path
      - metrics_path
      - registry_paths
      - source_of_truth
      - duplicate_policy
    rule: "Durable identity must use repo-relative paths. Absolute terminal paths are local context only."

  skill_routing:
    required_fields:
      - primary_family
      - primary_skill
      - support_skills
      - skills_selected
      - skills_not_used
      - critical_skills_not_selected
      - not_selected_claim_effect
      - required_gates
    rule: "Values must be derived from docs/agent_control/work_family_registry.yaml before implementation starts."

  agent_allocation:
    required_fields:
      - phase
      - selected_agents
      - role_modes
      - selection_reason
      - why_not_smaller
      - why_not_larger
      - max_threads_is_capacity_only
      - source_of_truth_files_checked
      - selected_skill_rules_checked
      - user_constraints_checked
      - owner_accept_reject_or_rewrite_decision
      - claim_effect
    rule: "Task Force/sub-agent spawning is disabled. Keep selected_agents and role_modes empty; use local skills, validators, source-of-truth files, and user review instead."

  execution_provenance:
    required_fields:
      - git_sha
      - branch
      - dirty_flag
      - changed_files
      - command_argv
      - python_executable
      - python_version
      - key_package_versions
      - started_at_utc
      - ended_at_utc
      - input_hashes
      - output_hashes
      - unknown_git_claim_effect
    rule: "Unknown git or environment identity is allowed for planning scaffold only and lowers reproducible-run, bundle, runtime, handoff, pass, readiness, and Goal Achieve claims."

  final_claim_policy:
    required_fields:
      - allowed_claims
      - forbidden_claims
      - claim_vocabulary_reference
      - claim_downgrade_rules

  runtime_learning_probe_decision:
    required_fields:
      - required
      - decision
      - reason
      - forbidden_skip_reasons_checked
      - lowered_claim_if_not_run

  failure_disposition:
    required_when:
      - result_judgment_is_blocked
      - result_judgment_is_deferred
      - result_judgment_is_invalid
      - result_judgment_is_discarded
      - tool_or_adapter_or_runtime_support_gap_blocks_progress
    required_fields:
      - status
      - attempt_before_disposition
      - failure_reproduction
      - exact_failing_layer
      - root_cause_hypothesis
      - bounded_repair_or_fallback_attempt_or_attempt_blocker
      - evidence_path
      - remaining_blocker
      - reopen_condition
      - claim_effect
    rule: "Do not use blocked, deferred, invalid, or discarded as a final disposition until the failing layer has been reproduced and the smallest credible repo-controlled repair, adapter, or fallback has been attempted or narrowly blocked. Missing adapter/glue under repo control is an implementation task first, not a final blocker."

runtime_required_evidence_terms:
  - dataset_id
  - feature_schema_hash
  - feature_order_hash
  - label_id
  - split_id
  - onnx_sha256
  - ea_source_hash
  - ea_binary_hash
  - set_ini_hash
  - tester_identity
  - report_hash
  - trade_list_hash
  - telemetry_hash
  - proxy_runtime_parity
  - minimum_reconciliation_attempt
  - unit_semantics
  - comparison_class
  - divergence_judgment
  - prevention_memory
