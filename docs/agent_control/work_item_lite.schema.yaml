version: work_item_lite_schema_v2
required_top_level:
  - version
  - work_item_id
  - request_digest
  - primary_family
  - primary_skill
  - verification_profile
  - targets
  - acceptance_criteria
  - claim_boundary
  - policy_binding
  - outputs
  - next_action

operational_validation_required_fields:
  contract: docs/agent_control/writer_scope_operating_contract.yaml
  required_when:
    - new_work_item_record
    - writer_or_boundary_record
    - workspace_state_mutation
    - campaign_or_wave_boundary_decision
  fields:
    - writer_contract_version
    - validation_depth
    - non_pytest_smokes
    - skipped_broad_validations
    - broad_validation_escalation_reason
    - writer_preflight_gate
    - validation_attempt_budget
    - writer_scope_self_check
    - source_of_truth_paths
    - unresolved_blockers_or_none
    - next_action_or_reopen_condition
  rule: missing_operational_validation_fields_are_writer_contract_drift_not_a_pytest_trigger
  validation_attempt_budget_rule: initial_writer_scope_smoke_plus_one_owner_repair_resmoke_then_blocker_or_escalation_record
