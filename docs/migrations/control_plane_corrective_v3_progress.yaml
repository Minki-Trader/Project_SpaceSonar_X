      - tests/control_plane/test_transaction_atomicity.py
    transaction_protocol:
      id_generation: microsecond timestamp plus random UUID nonce; same command transactions have distinct IDs and receipt paths
      receipt_collision_policy: existing transaction workspace aborts before staging because resume mode is not implemented
      precondition_capture: stage time current hashes are recorded as input_hashes before mutation
      preimages:
        captured_before_replacement: true
        verified_against_stage_time_precondition: true
        fields:
          - path
          - existed
          - sha256
          - backup_path
      merged_future_validation: isolated future repository is materialized from git ls-files cached and unignored-other files, then staged replacements and deletions are applied
      future_tree_inode_policy: no hardlinks are used for unchanged files
      validation_order: staged representation, stage-time precondition check, isolated future validation, precondition recheck, then noop detection
      commit_journal: .spacesonar/transactions/<tx_id>/commit_journal.yaml
      commit_journal_states:
        - prepared
        - applying
        - committed
        - rolled_back
        - rollback_failed
      finalization_protection: rollback is attempted for any exception after canonical mutation, including output verification and final receipt path failures
      output_verification: staged file hashes must match canonical outputs and staged deletion targets must be absent before committed status
      rollback:
        restores_preimages: true
        verifies_restored_hashes: true
        occurs_before_rollback_journal_or_receipt_persistence: true
        audit_persistence_failure_is_nonfatal_to_canonical_restore: true
        records_applied_paths_before_failure: true
        records_restored_paths: true
        records_rollback_verification: true
      metadata_write_protocol: sibling temporary file, file fsync, atomic replace, best-effort parent directory fsync
      statuses:
        - committed
        - noop_already_applied
        - aborted_validation_failed
        - aborted_precondition_failed
        - rolled_back_commit_failure
        - rollback_failed
