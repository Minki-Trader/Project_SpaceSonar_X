version: onnx_lab_profile_v1
lab_id: spacesonar_onnx_lab
instrument: FPMarkets US100
timeframe: M5

identity_hierarchy:
  - goal_id
  - wave_id
  - campaign_id
  - idea_id
  - hypothesis_id
  - surface_id
  - sweep_id
  - run_id
  - artifact_id
  - bundle_id
  - candidate_id

axis_tags:
  - task_surface
  - feature_surface
  - target_or_label_surface
  - decision_use
  - horizon_or_holding_policy
  - model_family
  - objective
  - calibration
  - decision_surface
  - risk_shape
  - runtime_parity
  - synthesis_mix

candidate_lifecycle:
  - idea_open
  - scout_surface
  - research_candidate
  - probe_candidate
  - advisory_queue
  - preserved_clue
  - negative_memory
  - invalid_setup
  - blocked_retry

run_id_format: "onnxlab_<YYYYMMDDTHHMMSSZ>_<short_slug>"
bundle_id_format: "bundle_<YYYYMMDDTHHMMSSZ>_<short_slug>"
claim_default: exploration_only
concept_start_state: blank_slate
repair_carryover_policy: forbidden_without_recorded_new_surface_divergence_or_prevention_memory
neighborhood_perturbation_policy: meaningful_adjacent_variables_only
failure_disposition_policy:
  cannot_or_unsupported_is_final: false
  nonworking_result_is_diagnosis_until_attempted: true
  scope: global_all_repo_controlled_failures
  active_attempt_default_when_execution_or_mutation_allowed: true
  order:
    - diagnose
    - reproduce_failing_layer
    - attempt_smallest_repo_controlled_repair_adapter_or_fallback
    - record_evidence_and_reopen_condition
    - only_then_block_defer_invalidate_or_discard
  required_before_blocked_deferred_invalid_or_discarded:
    - failure_reproduction
    - exact_failing_layer
    - bounded_repair_or_fallback_attempt
    - evidence_path
    - remaining_blocker
    - reopen_condition
  repo_controlled_support_gap_action: build_or_patch_smallest_adapter_or_fallback
  no_adapter_exists_claim_effect: repair_trigger_not_blocker
  discard_or_defer_requires_failed_attempt_or_narrow_attempt_blocker: true
  attempt_exception_policy: record_attempt_blocker_and_lower_claim_boundary
  not_yet_attempted_claim_effect: investigation_in_progress_no_disposition
experiment_first_operating_loop:
  default_progress_unit: next_executable_experiment_writer_or_probe
  validation_is_progress: false
  inspection_is_progress: false
  registry_projection_is_proof: false
  proof_rule: manifest_receipt_hash_before_registry_projection
  generic_review_gates_after_experiment_first: forbidden_unless_blocker_requires_user_choice
  campaign_open:
    meaningful_multi_axis_surface_required: true
    default_proxy_spec_count: 18
    required_axes:
      - target_or_label_surface
      - feature_or_input_surface
      - model_or_training_surface
      - decision_surface
      - horizon_or_holding_policy
      - evaluation_or_runtime_surface
  tiny_validation_samples:
    default: forbidden
    allowed_only_with:
      - explicit_budget_blocker
      - explicit_environment_blocker
  broad_validation:
    role: archive_or_escalation_only
    boundary_auto_allow: false
    requires_command_intent_gate: true
execution_weight_policy:
  posture: attempt_first_not_heavy_first
  operational_stability_kernel: docs/agent_control/operational_stability_kernel.yaml
  writer_scope_operating_contract: docs/agent_control/writer_scope_operating_contract.yaml
  default_first_pass: thinnest_execution_that_answers_current_question
  session_start_resume_default: current_truth_then_one_narrow_path_before_broad_reconciliation
  broad_reconciliation_requires:
    - campaign_or_wave_boundary_closeout
    - protected_runtime_economics_handoff_or_readiness_claim
    - shared_contract_or_helper_changed
    - source_of_truth_index_drift_detected_by_narrow_check
  separate_fields:
    - attempt_depth
    - verification_depth
  thin_first_pass_examples:
    - one_fixture
    - one_representative_run
    - one_export_smoke
    - one_parser_smoke
    - one_mt5_micro_path
  expand_when:
    - shared_contract_or_helper_changed
    - source_of_truth_index_drift_detected
    - campaign_or_wave_boundary_closeout
    - runtime_economics_handoff_or_protected_claim
    - thin_path_succeeds_and_surface_remains_useful
  global_sync_default: boundary_or_source_of_truth_only
  validation_cadence:
    run_loop_default:
      profile: fast_remote_smoke_plus_writer_receipts
      write_time_guard:
        guard_module: src/spacesonar/control_plane/writer_contract.py
        transaction_hook: ControlPlaneTransaction.stage_yaml
        strict_writer_surfaces_fail_before_mutation: true
      required_guards:
        - transaction_receipt
        - run_manifest_or_attempt_manifest
        - experiment_receipt_or_batch_receipt
        - artifact_lineage_hashes_when_outputs_exist
        - claim_boundary_and_forbidden_claims
        - machine_yaml_no_aliases_or_anchors
      forbidden_default_checks:
        - full_pytest
        - full_active_record_graph
        - full_project_validate
        - broad_hash_resync
        - global_registry_regeneration
      required_writer_contract_fields:
        - writer_contract_version
        - progress_class
        - progress_effect
        - next_executable_action
        - experiment_or_boundary_effect
        - validation_depth
        - non_pytest_smokes
        - skipped_broad_validations
        - broad_validation_escalation_reason
        - writer_preflight_gate
        - validation_attempt_budget
        - writer_scope_self_check
      validation_attempt_budget:
        max_writer_scope_attempts: 2
        allowed_attempts:
          - initial_writer_scope_smoke_after_write
          - one_repair_then_same_scope_resmoke
        third_attempt_effect: stop_and_record_blocker_or_escalation_gate
        broad_validation_resets_budget: false
        repeated_same_failure_effect: move_invariant_into_writer_parser_adapter_manifest_or_scoped_lint_before_any_repeat
    boundary_default:
      profile: source_of_truth_boundary_review_manual
      trigger_events:
        - campaign_or_wave_boundary_with_recorded_archive_escalation_reason
        - source_of_truth_drift
        - protected_claim_change
      default_evidence:
        - owned_manifest_receipt_hash_review
        - writer_scope_smoke
        - scoped_parse_compile_import
        - registry_projection_check_only_when_registry_changed
    archive_default:
      profile: full_regression_manual_user_requested_or_archive_only
      trigger_events:
        - shared_source_or_dependency_change_with_broad_blast_radius
        - validator_or_policy_semantics_change
        - user_requested_full_archive_recheck
      explicit_acknowledgement_required: true
  missing_adapter_first_action: smallest_explicit_translation_layer_to_test_path
  l4_policy_effect: valid_proxy_model_bearing_runs_still_require_L4_but_may_progress_in_bounded_batches
  l4_budget_accounting:
    budget_unit: validation_research_oos_pair
    required_period_roles_per_pair:
      - validation
      - research_oos
    physical_attempt_counts:
      - prepared_attempt_count
      - executed_attempt_count
      - runtime_probe_complete_count
    physical_attempt_count_meaning: period_role_strategy_tester_executions_not_budget_burn
    pair_count_meaning: one_declared_l4_cell_surface_runtime_kind_with_both_required_period_roles
wave_budget_policy:
  default_profile: standard_wave
  allocation_mode: fixed_wave_budget_variable_campaign_budget
  wave_budget_fixed_before_open: true
  standard_total_run_budget: 72
  standard_campaign_slots: 3
  reserve_fraction: 0.15
  campaign_run_budget_bounds:
    min_runs: 8
    default_runs: 18
    max_runs: 30
  per_campaign_allocation_reason_required: true
  hypothesis_allocation_reason_required: true
  allocation_reason_must_name:
    - hypothesis_surface_width
    - changed_axes
    - held_fixed_axes
    - why_this_campaign_needs_more_or_less_than_default
  mid_wave_budget_increase_policy: forbidden_without_new_wave_or_explicit_budget_amendment
  budget_exception_policy:
    default: none
    allowed_timing: before_wave_open
    required_fields:
      - exception_profile
      - reason
      - approved_by_user
      - claim_boundary
  legacy_retrofit_closeout_policy:
    retired_unused_active_budget_forbidden: true
    allowed_only_for_closed_legacy_wave_reclose: true
    required_rule: actualized_retrofit_budget_must_equal_materialized_content_inventory
    future_wave_effect: not_allowed_for_wave02_plus_pre_open_budget
  l4_pair_budget_policy:
    budget_unit: validation_research_oos_pair
    standard_pair_budget: 36
    physical_attempts_are_evidence_counts_not_budget_burn: true
    decision_replay_pair_budget_policy: separate_ledger_unless_explicitly_budgeted_with_standard_l4
campaign_exploration_policy:
  mode: unexplored_surface_discovery_not_single_axis_progression
  default_proxy_spec_count: 18
  meaningful_multi_axis_surface_required: true
  tiny_validation_samples_allowed_by_default: false
  forbidden_research_shapes:
    - feature_only_wave_or_campaign
    - label_only_wave_or_campaign
    - model_only_wave_or_campaign
    - threshold_only_wave_or_campaign
    - repair_only_wave_or_campaign
  required_research_axes:
    - target_or_label_surface
    - feature_or_input_surface
    - model_or_training_surface
  companion_axes:
    - decision_surface
    - horizon_or_holding_policy
    - evaluation_or_runtime_surface
  single_axis_exception_policy: control_fixture_plumbing_runtime_micro_probe_or_bug_repair_only_with_lowered_claim_boundary
kpi_interpretation_policy:
  required_for_kpi_bearing_judgment: true
  required_for_campaign_and_wave_closeout: true
  required_chain:
    - tested_factor_or_changed_variable
    - kpi_scope
    - observed_kpi_movement
    - comparison_baseline
    - directional_effect_hypothesis
    - segment_checks
    - evidence_limits
    - attribution_confidence
    - next_probe
  outcome_only_closeout_is_complete: false
  causal_language_requires:
    - matched_scope
    - control_variables
    - sufficient_sample
    - matching_proxy_runtime_evidence_when_runtime_claimed
  weak_evidence_claim_effect: exploratory_hypothesis_only
  segment_breakdown_policy:
    overall_required: true
    required_axes:
      - overall
      - period_role
      - time_window
      - session
      - direction
      - score_or_threshold_bucket
      - trade_shape_bucket
      - runtime_surface
    optional_axes:
      - volatility_regime
      - drawdown_cluster
      - holding_period_bucket
      - feature_family
      - target_family
      - model_family
      - spread_or_cost_bucket
    missing_segment_record_required: true
    fake_segment_placeholder_forbidden: true
    observed_segment_requires_metric_or_count_basis: true
    missing_segment_requires_next_materialization_step: true
    segment_claim_policy: segment_breakdowns_explain_instability_and_next_probe_only_not_selection_or_pass
closeout_kpi_ledger_policy:
  required_at:
    - campaign_closeout
    - bounded_synthesis_closeout
  fixed_record_files:
    - proxy_kpi_records.csv
    - mt5_runtime_kpi_records.csv
    - proxy_mt5_comparison_records.csv
  manifest_required: true
  summary_required: true
  synthesis_stage_kind: special_mixing
  missing_segment_record_required: true
  claim_effect: kpi_observation_only_no_runtime_authority_no_economics_pass_no_goal_achieve
intent_behavior_parity_policy:
  required_for:
    - proxy_model_bearing_campaign_closeout
    - proxy_model_bearing_bounded_synthesis_closeout
  comparison_scope: python_proxy_intent_vs_mt5_ea_behavior
  row_key_fields:
    - bar_close_time
    - symbol
    - period
    - period_role
    - decision_surface
  required_behavior_fields:
    - entry
    - exit
    - hold
    - flat
    - long
    - short
    - no_trade
  minimum_reconciliation_attempt_required: true
  allowed_reconciliation_attempts:
    - regenerate_full_python_decision_stream
    - repair_decision_surface_mapping
    - repair_unit_or_threshold_conversion
    - repair_ea_decision_logging_or_parser
    - record_expected_runtime_difference_with_prevention_memory
  closeout_without_parity_effect: lower_claim_and_reopen_intent_parity_probe
  claim_effect: parity_observation_only_no_runtime_authority_no_economics_pass
goal_operating_cadence_policy:
  user_revision: goal_operating_overrides_2026_06_29_v1
  codex_goal_tool_note: active_goal_objective_is_not_editable_in_place; repo_policy_is_durable_operating_target
  success_condition: operational_review_required_candidate_runtime_evidence_not_goal_achieve_before_matching_evidence
  bounded_synthesis_gate:
    trigger: after_5_standard_campaign_closeouts
    action: open_bounded_synthesis_before_next_standard_campaign
    stage_kind: special_mixing
    default_mix_depth:
      - mix-2
      - mix-3
    mix4_policy: exception_only_with_recorded_reason
    mix5_plus_policy: forbidden
  closeout_required_gates:
    - kpi_ledger_triad
    - intent_behavior_parity_or_reopen_probe
    - minimum_one_reconciliation_attempt_for_divergence
    - claim_boundary_no_protected_claims
    - main_boundary_integration
bounded_synthesis_policy:
  campaign_type: bounded_synthesis
  source_scope: previous_material_only
  cadence:
    trigger: after_5_standard_campaign_closeouts
    standard_campaign_closeout_count_required: 5
    counting_scope: since_last_bounded_synthesis_campaign
    early_open_exception: recorded_reason_required_before_open
  default_mix_depth:
    - mix-2
    - mix-3
  mix4_policy: exception_only_with_recorded_reason
  mix5_plus_policy: forbidden
  ingredient_lifecycle:
    raw_reuse_default: forbidden_after_consumed_by_completed_synthesis
    allowed_reuse_statuses:
      - carry_forward_ingredient
      - reopened_ingredient_exception
    carry_forward_requires_source_synthesis: true
    reopened_exception_requires_reason: true
  kpi_policy:
    ledger_required: true
    stage_kind: special_mixing
    same_fixed_schema_as_campaign_wave: true
  next_wave_influence: forbidden
  valid_proxy_runtime_level_required: L4_split_runtime_probe
  l4_promising_result_effect: continue_to_L5_candidate_runtime_evidence
north_star_objective:
  role: final_objective_not_exploration_gate
  timeframe_fixed: false
  task_fixed: false
  target:
    average_trades_per_active_day_min: 5
    profit_factor_min: 1.5
    profit_factor_preferred_range:
      - 1.5
      - 3.0
    drawdown_pct_max_across_major_windows: 10
    concentration_risk_rule: avoid_short_period_profit_concentration
  claim_effect: "Use as the final direction of travel. Do not reject early scout experiments only because they do not meet this objective yet."
no_default_assumptions:
  - feature_set
  - feature_count
  - feature_recipe_mix
  - label_definition
  - prediction_target
  - direction_mapping
  - holding_period
  - model_io_shape
  - output_head
  - threshold_policy
  - risk_logic

storage_contract:
  durable_identity: repo_relative_paths_only
  registry_rows_are_proof: false
  wave_campaign_storage_rule: wave_allocates_central_campaigns_by_reference
  git_integration_cadence:
    policy_reference: docs/policies/branch_policy.md
    durable_boundary_events:
      - campaign_open
      - campaign_close
      - bounded_synthesis_close
      - wave_open
      - wave_close
    main_push_policy: campaign_and_bounded_synthesis_closeout_required_after_coherent_commit
    mid_campaign_push_policy: forbidden_unless_explicit_user_boundary_request
    per_run_main_push_default: false
  source_of_truth_paths:
    wave_allocation: lab/waves/<wave_id>/wave_allocation.yaml
    wave_campaign_refs: lab/waves/<wave_id>/campaign_refs.csv
    campaign: lab/campaigns/<campaign_id>/campaign_manifest.yaml
    run_manifest: lab/runs/<run_id>/run_manifest.json
    experiment_receipt: lab/runs/<run_id>/experiment_receipt.yaml
    artifact_lineage: lab/runs/<run_id>/artifact_lineage.json
    metrics: lab/runs/<run_id>/metrics.json
    candidate_summary: lab/candidates/<candidate_id>/candidate_summary.yaml
    experiment_bundle: runtime/packages/<bundle_id>/experiment_bundle.json
    mt5_attempt_manifest: runtime/mt5_attempts/<attempt_id>/attempt_manifest.yaml
