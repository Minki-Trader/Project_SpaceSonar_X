proxy_runtime_parity:
  status: attempt_prepared_runtime_execution_pending
  shared_contract:
  - US100_M5_closed_bar_base_frame
  - feature_order_hash
  - single_score_output
  - period_profile_split_set_v0
  - us100_m5_fpmarkets_tester_execution_v0
  known_differences:
  - Python proxy row membership uses exported MT5 history; EA reconstructs features
    from Strategy Tester closed bars.
  - Strategy Tester spread/tick availability can differ from exported proxy data.
  - This score probe writes telemetry and does not place trades; economics report
    remains pending until a trading EA exists.
  - MT5 tester input strings can truncate long semicolon feature lists; runtime uses
    feature_columns.txt common-file transport.
  interpretation_drift_risks:
  - bar_close_timing
  - CopyRates_history_window_availability
  - spread_field_semantics
  - score_threshold_translation
  - non_trading_decision_observation_vs_trading_execution
  minimum_reconciliation_attempt:
    status: terminal_score_probe_observed
    attempt: MT5 Strategy Tester executed the prepared ONNX score EA against the declared
      period role
    forced_equality_required: false
    evidence_path: runtime/mt5_attempts/attempt_wave01_eb_cell_003_l4_validation_v0/score_telemetry_summary.yaml
  unit_semantics:
    features: float32 closed-bar values in bundle feature order
    price_units: MT5 price values from MqlRates
    spread: MqlRates.spread raw points scaled only where feature contract says spread_scaled
    lot: fixed_lot_profile_recorded_but_EA_non_trading
    point_tick_digits: recorded in tester report when trading/runtime EA is introduced
  comparison_class: pending_pair_aggregation_after_L4_period_roles
  divergence_judgment: runtime_score_telemetry_observed_pending_proxy_row_comparison
  prevention_memory:
  - Use semicolon feature-column delimiter in tester config to avoid MT5 optimization
    pipe syntax ambiguity.
  - Do not treat prepared tester configs as completed L4 evidence.
  - If EA feature reconstruction diverges from Python proxy, preserve the difference
    as parity evidence before judging the proxy.
  - Use Common Files feature_columns.txt transport for long feature lists to avoid
    MT5 tester input truncation.
  - Wave01 L4 runner normalizes reused Wave0 runner outputs to prevent campaign identity
    drift.
  follow_up_action: aggregate this period role with its paired L4 attempt before L5
    decision
  claim_boundary: proxy_runtime_parity_tracking_only_no_runtime_authority
