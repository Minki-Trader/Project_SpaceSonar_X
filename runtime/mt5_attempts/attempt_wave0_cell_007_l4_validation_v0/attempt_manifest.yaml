  - US100_M5_closed_bar_base_frame
  - feature_order_hash
  - single_score_output
  - period_profile_split_set_v0
  - us100_m5_fpmarkets_tester_execution_v0
  known_differences:
  - Python proxy row membership uses exported MT5 history; EA reconstructs features
    from Strategy Tester closed bars.
  - Strategy Tester spread/tick availability can differ from exported proxy data.
  - This score probe writes telemetry and does not place trades; economics report
    remains pending until a trading EA exists.
  - MT5 tester input strings can truncate long semicolon feature lists; runtime uses
    feature_columns.txt common-file transport.
  interpretation_drift_risks:
  - bar_close_timing
  - CopyRates_history_window_availability
  - spread_field_semantics
  - score_threshold_translation
  - non_trading_decision_observation_vs_trading_execution
