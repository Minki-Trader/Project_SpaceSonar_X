version: wave_allocation_v1
wave_id: wave_YYYYMMDD_short_slug
active_goal_id: <goal_id>
role: allocation_batch
status: planned
claim_boundary: planning_scaffold
allocation_goal: ""
storage_contract:
  source_of_truth: lab/waves/<wave_id>/wave_allocation.yaml
  campaign_refs: lab/waves/<wave_id>/campaign_refs.csv
  registry_rows:
    - docs/registers/wave_registry.csv
  durable_identity_policy: repo_relative_paths_only
  campaign_storage_rule: central_campaign_source_of_truth_linked_by_wave_refs
git_integration:
  policy_reference: docs/policies/branch_policy.md
  open_event: wave_open
  close_event: wave_close
  main_push_policy: boundary_only_after_coherent_commit
  per_run_main_push_default: false
  status: pending
budget:
  budget_profile: standard_wave
  allocation_mode: fixed_wave_budget_variable_campaign_budget
  wave_budget_fixed_before_open: true
  max_runs: 72
  standard_total_run_budget: 72
  standard_campaign_slots: 3
  reserve_fraction: 0.15
  max_wallclock_hours: null
  max_repairs_per_surface: 1
  max_total_repairs_fraction: 0.15
  campaign_run_budget_bounds:
    min_runs: 8
    default_runs: 18
    max_runs: 30
  per_campaign_allocation_reason_required: true
  hypothesis_allocation_reason_required: true
  allocation_reason_must_name:
    - hypothesis_surface_width
    - changed_axes
    - held_fixed_axes
    - why_this_campaign_needs_more_or_less_than_default
  mid_wave_budget_increase_policy: forbidden_without_new_wave_or_explicit_budget_amendment
  budget_exception:
    status: none
    allowed_timing: before_wave_open
    exception_profile: null
    reason: ""
    approved_by_user: false
    claim_boundary: planning_scaffold
  l4_pair_budget: 36
  l4_budget_unit: validation_research_oos_pair
  l4_required_period_roles:
    - validation
    - research_oos
  l4_physical_attempt_count_policy: period_role_strategy_tester_executions_are_evidence_counts_not_budget_units
  decision_replay_pair_budget: separate_ledger_unless_explicitly_budgeted_with_standard_l4
  repair_budget_policy: bounded_surface_or_parity_repair_only_not_single_candidate_extension
  repair_carryover_policy: forbidden_without_prior_new_surface_or_divergence_record
  neighborhood_perturbation_policy: meaningful_adjacent_variables_only
fixed_controls:
  base_symbol: US100
  timeframe: M5
  broker: FPMarkets
  row_key: us100_bar_close_time
  parity_policy: declare_runtime_level_per_surface
sampling_plan:
  mode: mixed
  notes: ""
campaign_allocations: []
rotation_conditions:
  - rotate_if_candidate_local_repairs_repeat_without_reusable_surface_clue
  - reject_next_wave_or_campaign_relabeling_if_repair_has_no_recorded_new_surface_or_divergence
  - open_divergence_campaign_if_repair_reveals_proxy_runtime_semantics_gap
stop_conditions:
  - neighborhood_perturbation_becomes_generic_micro_tuning_or_candidate_laundering
notes: ""
