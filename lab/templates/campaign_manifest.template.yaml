version: campaign_manifest_v1
campaign_id: campaign_short_slug
active_goal_id: <goal_id>
status: planned
campaign_type: standard_experiment
wave_ids: []
idea_ids: []
hypothesis_ids: []
objective: ""
axis_tags: []
surface_policy: broad_first
exploration_coverage:
  mode: unexplored_surface_discovery_not_single_axis_progression
  primary_unknown_axis: null
  required_research_axes:
    - target_or_label_surface
    - feature_or_input_surface
    - model_or_training_surface
  companion_axes:
    - decision_surface
    - horizon_or_holding_policy
    - evaluation_or_runtime_surface
  forbidden_research_shapes:
    - feature_only_wave_or_campaign
    - label_only_wave_or_campaign
    - model_only_wave_or_campaign
    - threshold_only_wave_or_campaign
    - repair_only_wave_or_campaign
  single_axis_exception_policy: control_fixture_plumbing_runtime_micro_probe_or_bug_repair_only_with_lowered_claim_boundary
  novelty_claim: must_name_untried_or_underexplored_surface_before_opening
kpi_interpretation_policy:
  required_for_closeout: true
  required_for_kpi_bearing_results: true
  outcome_only_closeout_is_complete: false
  required_chain:
    - tested_factor_or_changed_variable
    - kpi_scope
    - observed_kpi_movement
    - comparison_baseline
    - directional_effect_hypothesis
    - segment_checks
    - evidence_limits
    - attribution_confidence
    - next_probe
  segment_breakdown_policy:
    overall_required: true
    required_axes:
      - overall
      - period_role
      - time_window
      - session
      - direction
      - score_or_threshold_bucket
      - trade_shape_bucket
      - runtime_surface
    missing_segment_record_required: true
    segment_claim_policy: segment_breakdowns_explain_instability_and_next_probe_only_not_selection_or_pass
    fake_segment_placeholder_forbidden: true
    observed_segment_requires_metric_or_count_basis: true
    missing_segment_requires_next_materialization_step: true
  claim_effect: exploratory_hypothesis_only_until_controls_and_runtime_evidence_support_stronger_claim
bounded_synthesis:
  enabled: false
  source_scope: previous_material_only
  cadence:
    trigger: after_5_standard_campaign_closeouts
    standard_campaign_closeout_count_required: 5
    counting_scope: since_last_bounded_synthesis_campaign
    counted_standard_campaign_ids: []
    early_open_exception_reason: ""
  source_campaign_ids: []
  source_run_ids: []
  source_clue_ids: []
  source_negative_memory_ids: []
  source_divergence_ids: []
  ingredient_registry: docs/registers/ingredient_card_registry.csv
  synthesis_registry: docs/registers/synthesis_campaign_registry.csv
  ingredient_cards_path: lab/campaigns/<campaign_id>/synthesis/ingredients/
  mix_queue_path: lab/campaigns/<campaign_id>/synthesis/mix_queue.yaml
  mix_depth_policy:
    default_sequence:
      - mix-2
      - mix-3
    mix4_policy: exception_only_with_recorded_reason
    mix5_plus_policy: forbidden
  ingredient_lifecycle_policy:
    raw_reuse_default: forbidden_after_consumed_by_completed_synthesis
    allowed_reuse_statuses:
      - carry_forward_ingredient
      - reopened_ingredient_exception
    carry_forward_requires_source_synthesis: true
    reopened_exception_requires_reason: true
  kpi_policy:
    ledger_required: true
    ledger_path: lab/campaigns/<campaign_id>/kpi/
    stage_kind: special_mixing
    same_fixed_schema_as_campaign_wave: true
    overall_and_segment_breakdowns_required: true
    fake_segment_placeholder_forbidden: true
    observed_segment_requires_metric_or_count_basis: true
    missing_segment_requires_next_materialization_step: true
    closeout_requires_kpi_interpretation: true
  next_wave_influence: forbidden_reference_only
  runtime_follow_through:
    valid_proxy_model_bearing_mix_requires_l4: true
    l4_promising_result_effect: continue_to_L5_candidate_runtime_evidence
  closeout_artifacts:
    synthesis_closeout_path: lab/campaigns/<campaign_id>/synthesis/synthesis_closeout.yaml
    kpi_summary_path: lab/campaigns/<campaign_id>/kpi/kpi_summary.yaml
    carry_forward_index_path: lab/campaigns/<campaign_id>/synthesis/carry_forward_ingredients.csv
  claim_boundary: synthesis_learning_only_no_next_wave_direction_no_selected_baseline_no_runtime_authority
candidate_repair_policy:
  allowed_scope: bounded_run_or_sweep_only
  max_repeated_candidate_repairs_without_new_surface_clue: 1
  repeated_repair_action: close_or_open_new_surface_or_divergence_campaign
  forbidden_use: long_candidate_extension_inside_wave_or_campaign
  carryover_policy: forbidden_to_relabel_repair_as_new_hypothesis_without_recorded_new_surface_or_divergence
  neighborhood_perturbation_scope: meaningful_adjacent_variables_only
  neighborhood_stop_condition: stop_when_micro_tuning_candidate_laundering_or_no_new_prevention_memory
failure_disposition_policy:
  cannot_unsupported_unavailable_are_diagnosis_only: true
  required_before_blocked_deferred_invalid_or_discarded:
    - failure_reproduction
    - exact_failing_layer
    - bounded_repair_or_fallback_attempt
    - evidence_path
    - remaining_blocker
    - reopen_condition
  repo_controlled_support_gap_action: build_or_patch_smallest_adapter_or_fallback
  no_adapter_exists_claim_effect: repair_trigger_not_blocker
storage_contract:
  source_of_truth: lab/campaigns/<campaign_id>/campaign_manifest.yaml
  wave_campaign_refs: []
  registry_rows:
    - docs/registers/campaign_registry.csv
  durable_identity_policy: repo_relative_paths_only
  wave_link_policy: central_campaign_folder_referenced_by_wave_allocation
git_integration:
  policy_reference: docs/policies/branch_policy.md
  open_event: campaign_open
  close_event: campaign_close
  main_push_policy: boundary_only_after_coherent_commit
  per_run_main_push_default: false
  status: pending
skill_routing:
  primary_family: experiment_design
  primary_skill: spacesonar-experiment-design
  support_skills: []
required_gates: []
claim_boundary: exploration_only
default_runtime_level_target: L3_mt5_micro_probe
proxy_runtime_parity:
  required_for_proxy_model_bearing_runs: true
  shared_contract: []
  known_differences: []
  interpretation_drift_risks: []
  minimum_reconciliation_attempt:
    required: true
    status: pending
    note: "Try at least one repair, conversion, or interpretation check before closing proxy-vs-MT5 divergence."
  unit_semantics:
    point: null
    pip: null
    tick_size: null
    digits: null
    price_distance: null
    atr_multiplier: null
    rounding_policy: null
  comparison_classes:
    - proxy_good_runtime_good
    - proxy_good_runtime_bad
    - proxy_bad_runtime_bad
    - proxy_bad_runtime_good
    - invalid_or_unmaterializable
  divergence_judgment: pending
  prevention_memory: []
  follow_up_action: pending
  claim_boundary: campaign_parity_tracking_only_no_runtime_authority
stop_conditions: []
runtime_learning_probe_decision_default:
  required_when_runtime_question: true
  forbidden_standalone_skip_reasons:
    - probe_is_heavy
    - probe_is_expensive
    - proxy_result_is_weak
    - trade_count_is_low
    - candidate_is_ambiguous
    - setup_might_fail
notes: ""
