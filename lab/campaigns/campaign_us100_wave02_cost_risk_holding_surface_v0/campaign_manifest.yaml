objective: Open the second Wave02 campaign as a cost/risk/holding surface. The campaign
  tests whether explicit entry-cost, open-failed avoidance, adverse-excursion, abstain,
  and timeout/exit semantics create a more runtime-testable decision surface than
  repeating the closed momentum_ret_1 decision replay.
