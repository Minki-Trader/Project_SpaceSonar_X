- runtime/packages/bundle_20260621T131542Z_fixture_plumbing_v0/experiment_bundle.json
- runtime/mt5_attempts/attempt_20260621T131542Z_mt5_onnx_fixture_v0/attempt_manifest.yaml
evidence_debt:
  status: none_for_fixed_fixture_micro_probe
  remaining_claim_limits:
  - no_strategy_tester_economics_claim
  - no_runtime_authority_claim
  - no_candidate_or_baseline_claim
  - no_standard_portable_runtime_completion_claim
terminal_mode_evidence:
