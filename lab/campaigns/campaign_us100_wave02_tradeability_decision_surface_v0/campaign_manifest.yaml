experiment_design:
  hypothesis: 'A surface that predicts tradeability plus direction/abstain state should
    be more runtime-testable than reusing Wave01 scalar score bands, because the decision
    head directly declares side, no-trade, and holding/exit semantics.

    '
  decision_use: side_abstain_tradeability_gate
  comparison_baseline:
  - no_trade_baseline
  - Wave01 preserved clues as questions only
  control_variables:
  - FPMarkets US100 M5 closed-bar base frame
  - split_set_v0 validation and research_oos roles
  - locked final OOS excluded
  - no inherited Wave01 thresholds or candidates
  changed_variables:
  - explicit tradeability target
  - explicit side/abstain decision surface
  - session/range state feature surface
  - runtime-oriented sparse decision semantics
  kpi_interpretation_plan:
    required_for_kpi_bearing_result: true
    required_axes:
    - overall
    - period_role
    - time_window
    - session
    - direction
    - score_or_threshold_bucket
    - trade_shape_bucket
    - runtime_surface
    claim_effect: exploratory_hypothesis_only_no_selection_or_pass
  expected_effect_probe: 'Useful cells should show stable trade/no-trade separation
    and interpretable side behavior in proxy metrics before any L4/L5 escalation.

    '
  surface_rotation_rationale: 'Wave01 left decision-surface questions, not candidates.
    Wave02 starts with a new decision surface rather than local repairs to score-band
    or inverse score-band attempts.

    '
  search_shape: broad
  axis_balance_check: multi_axis_surface_not_single_axis_repair
  sample_scope:
    instrument: FPMarkets US100
    timeframe: M5
    split_recipe_id: split_set_v0
    locked_final_oos: excluded
  success_criteria:
  - proxy metrics identify at least one interpretable tradeability/side surface worth
    L4 follow-through
  - valid proxy/model-bearing runs declare ONNX/EA/MT5 follow-through requirements
  - no selected baseline or runtime authority is claimed
  failure_criteria:
  - proxy and runtime semantics cannot be reconciled after a bounded repair/fallback
    attempt
  - broad cells collapse into generic threshold repair without a new surface clue
  - runtime execution semantics are undefined for model-bearing outputs
  invalid_conditions:
  - locked final OOS is used without unlock contract
  - inherited Wave01 thresholds are treated as candidates
  - campaign becomes feature-only, label-only, model-only, threshold-only, or repair-only
  stop_conditions:
  - no reusable surface clue after the initial broad batch and one bounded repair
    at most
  - evidence cannot support any stronger claim than exploratory observation
  evidence_plan:
  - campaign_manifest
  - run_specs_index
  - run_manifest
  - experiment_receipt
  - artifact_lineage
  - metrics
  - ONNX bundle and parity record for valid model-bearing runs
  - MT5 L4 attempt manifests for promising or valid proxy/model-bearing runs
