acceptance_criteria:
- Preserve the active goal meaning: long-running Codex operating stability is primary;
  Wave01 closeout is the proof window.
- For each of the 12 Wave0 first-batch proxy runs, either produce L4 MT5 split-runtime
  evidence or record a repair/invalid reason before it can count as proxy evidence.
- For each L4 follow-through attempt, record proxy_runtime_parity with shared contract,
  known differences, interpretation drift risks, comparison class, divergence judgment,
  and follow-up action.
- Make at least one explicit reconciliation attempt for any proxy-vs-MT5 mismatch;
  then record whether the result was repaired, accepted as an expected difference,
  or preserved as a surprise clue.
- Record unit semantics when relevant, including point, pip, tick size, digits, price
  distance, ATR stop conversion, lot step, and rounding policy.
- Use runtime_period_set_id split_base_anchor_v0_research_l4 with validation and research_oos
  roles.
- Keep OOS-B locked unless a later frozen candidate explicitly unlocks it.
- Do not stop at proxy-only closeout for any valid proxy/model-bearing run.
- If an L4 result remains promising, write the next work item toward L5_candidate_runtime_evidence.
- Do not claim runtime authority, economics pass, selected baseline, live readiness,
  or Goal Achieve.
- If recurring operational/system failure appears, classify it as operational or system,
  weigh recurrence risk, impact, and operating importance, then add an appropriately
  weighted guard without unnecessary bureaucracy.
