objective: >
  Open Wave03 as a fresh multi-axis volatility state transition surface for
  FPMarkets US100 M5. The first campaign tests whether compression,
  expansion, exhaustion, and release states can define reversal/continuation
  decisions that remain proxy-testable and later ONNX/EA/MT5 L4-testable
  without inheriting any prior candidate, selected baseline, threshold, or
  runtime authority.
