  split_recipe_id: split_set_v0
  eval_recipe_id: eval_wave03_proxy_runtime_kpi_v0
experiment_design:
  hypothesis: >
    Intraday volatility compression, expansion, and exhaustion states can
    expose US100 M5 reversal or continuation windows that are more stable than
    prior tradeability repair cells because the label, feature, decision, and
    holding surfaces all describe the same transition event.
  decision_use: reversal_continuation_abstain_gate
  comparison_baseline:
    - no_trade_baseline_named_only_not_selected
    - within_campaign_axis_controls_only
    - Wave02 negative and clue records used as prevention memory only
  control_variables:
    - FPMarkets US100 M5 closed-bar base frame
    - split_set_v0 validation and research_oos roles
    - locked final OOS excluded
    - no inherited Wave01 or Wave02 thresholds, candidates, or runtime authority
    - valid proxy/model-bearing runs must keep ONNX/EA/MT5 L4 follow-through path
  changed_variables:
    - compression_break versus expansion_exhaustion labels
    - volatility percentile, realized volatility, and session transition feature surfaces
    - interpretable logistic, tree, and boosted ONNX-feasible model families
    - reversal, continuation, tradeability-then-side, and volatility-stop decisions
    - h6, h8, and h12 holding horizons
    - proxy metrics designed for later L4 validation and research_oos runtime probes
  kpi_interpretation_plan:
    required_for_kpi_bearing_result: true
    required_axes:
      - overall
      - period_role
      - time_window
      - session
      - direction
      - score_or_threshold_bucket
      - trade_shape_bucket
      - runtime_surface
    claim_effect: exploratory_hypothesis_only_no_selection_or_pass
  attribution_axes:
    - target_or_label_surface
    - feature_or_input_surface
    - model_or_training_surface
    - decision_surface
    - horizon_or_holding_policy
    - evaluation_or_runtime_surface
  expected_effect_probe: >
    Useful cells should separate transition states into sparse reversal or
    continuation decisions with interpretable proxy behavior before any L4
    runtime escalation.
  surface_rotation_rationale: >
    Wave02 ended without an L5 candidate. Wave03 opens a new volatility-state
    transition surface instead of extending candidate-local repairs or
    threshold-only search.
  search_shape: broad
  next_surface_options:
    - rotate_to_intraday_liquidity_regime_if_volatility_transition_is_negative
    - narrow_to_repeated_compression_release_clue_only_after_broad_evidence
    - materialize_onnx_and_l4_follow_through_for_valid_model_bearing_proxy_runs
  axis_balance_check: multi_axis_surface_not_single_axis_repair
  sample_scope:
    instrument: FPMarkets US100
    timeframe: M5
    split_recipe_id: split_set_v0
    validation_role: validation
    research_oos_role: research_oos
    locked_final_oos: excluded
  success_criteria:
    - proxy metrics identify at least one interpretable volatility-state transition surface worth L4 follow-through
    - valid proxy/model-bearing runs declare ONNX/EA/MT5 follow-through requirements
    - no selected baseline, runtime authority, economics pass, live readiness, or Goal Achieve claim is made
  failure_criteria:
    - broad cells collapse into threshold-only repair without a reusable transition-state clue
    - proxy semantics cannot be mapped to sparse EA decisions after one bounded repair attempt
    - volatility state features fail to distinguish transition behavior in validation and research_oos observation
  invalid_conditions:
    - locked final OOS is used without an explicit unlock contract
    - prior Wave02 candidate or threshold is reopened as the target of this campaign
    - campaign becomes feature-only, label-only, model-only, threshold-only, or repair-only
  stop_conditions:
    - no reusable surface clue after the initial 18-spec broad batch and one bounded repair at most
    - evidence cannot support any stronger claim than exploratory observation
  reopen_or_stop_condition: rotate_surface_or_record_negative_memory_after_broad_batch_if_no_reusable_clue
  evidence_plan:
    - campaign_manifest
    - run_specs_index
    - run_spec_manifests
    - proxy_execution_summary
    - run_manifest
    - experiment_receipt
    - artifact_lineage
    - metrics
    - ONNX bundle and parity record for valid model-bearing runs
    - MT5 L4 attempt manifests for promising or valid proxy/model-bearing runs
  claim_boundary: wave03_campaign_open_no_candidate_no_selected_baseline_no_runtime_authority_no_economics_pass_no_live_readiness_no_goal_achieve
  legacy_relation: blank_slate_no_inheritance_prior_wave_memory_is_prevention_only
  axis_tags:
    - target_or_label_surface
    - feature_or_input_surface
    - model_or_training_surface
    - decision_surface
    - horizon_or_holding_policy
    - evaluation_or_runtime_surface
  broad_sweep:
    proxy_spec_count: 18
    surface_width: multi_axis
    default_count_policy: campaign_open_default_proxy_spec_policy
  extreme_sweep:
    status: not_started
    gate: only_after_broad_repeated_clue_or_surface_gap
  micro_search_gate:
    status: disabled_until_repeated_clue
    reason: broad surface discovery comes before threshold or micro-search
  failure_memory:
    negative_memory_required_if_closed_negative: true
    negative_closeout_reopens_candidate_repair: false
