allocation_goal: >
  Use the first Wave03 campaign for broad volatility-state transition
  discovery across target, feature, model, decision, holding, and runtime
  axes. Rotate rather than reopen Wave02 candidate repair unless a new surface
  clue or prevention-memory question is recorded.
allocation_reason: >
  hypothesis_surface_width: first Wave03 broad volatility-state transition
  surface; changed_axes: target/label, feature/input, model/training,
  decision, horizon/holding, evaluation/runtime; held_fixed_axes: FPMarkets
  US100 M5 closed bars, split_set_v0 validation plus research_oos roles,
  locked final OOS excluded, no inherited thresholds or candidates;
  why_this_campaign_needs_more_or_less_than_default: uses the default 18
  proxy specs to cover the initial multi-axis surface without becoming a
  single-axis repair track.
