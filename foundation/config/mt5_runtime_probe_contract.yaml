version: mt5_runtime_probe_contract_v2
standard_probe_profile: explicit_period_profile_required
claim_boundary: runtime_probe_contract_only_no_runtime_authority_no_pass

period_authority:
  dates_embedded_in_this_file: false
  required_period_profile_id: period_profile_split_set_v0
  required_period_profile_path: configs/mt5/period_profiles/split_set_v0_runtime_periods.yaml
  default_runtime_period_set_id: split_base_anchor_v0_research_l4
  locked_final_period_set_id: split_base_anchor_v0_locked_final
  locked_final_requires_explicit_unlock: true
  rule: "Runtime attempts must name period_profile_id and runtime_period_set_id. This contract does not define train, validation, OOS, or WFO dates."

execution_authority:
  tester_execution_profile_id: us100_m5_fpmarkets_tester_execution_v0
  tester_execution_profile_path: configs/mt5/tester_execution_profile_v0.yaml
  rule: "Execution settings live in the tester execution profile. Date windows live in period profiles."

runtime_learning_probe_decision:
  required_for_runtime_claim_surfaces: true
  proxy_follow_through_required: true
  proxy_follow_through_rule: "Every valid proxy/model-bearing experiment must progress to L4_split_runtime_probe. Proxy-only closeout is not allowed for a valid proxy run."
  adapter_blocker_rule: "Missing converter, export adapter, EA adapter, parser support, or runtime glue is a diagnostic state only. If the missing piece is under repo/control, build and test the smallest concrete adapter or fallback before blocked, invalid, deferred, or discard status. Only user secrets, unavailable external state, destructive/unsafe action, or policy violation can block the attempt; record evidence path, remaining blocker, and reopen condition."
  l5_continuation_rule: "If L4_split_runtime_probe remains promising under the declared surface, continue to L5_candidate_runtime_evidence with candidate-specific manifests."
  campaign_parity_required: true
  campaign_parity_rule: "Every proxy/model-bearing campaign must record proxy_runtime_parity before closing proxy evidence. This includes matching behavior, expected runtime differences, at least one reconciliation attempt, unit semantics, unexplained divergence, prevention memory, and proxy-bad/runtime-good surprises. Parity reconciliation does not force equality when the true proxy and MT5 semantics differ."
  record_field: runtime_learning_probe_decision
  allowed_decisions:
    - run_required
    - not_applicable_no_runtime_question
    - blocked_no_actionable_runtime_surface
    - lowered_claim_runtime_probe_needed
  forbidden_standalone_skip_reasons:
    - probe_is_heavy
    - probe_is_expensive
    - proxy_result_is_weak
    - trade_count_is_low
    - candidate_is_ambiguous
    - setup_might_fail
  rule: "Every valid proxy/model-bearing experiment must reach L4_split_runtime_probe. If runtime behavior, economics, EA/ONNX meaning, Strategy Tester output, materialization, handoff, or live-like operation is the question, run the narrow sufficient MT5 probe or lower the claim. not_applicable_no_runtime_question is allowed only for design/intake/analysis records that do not create a proxy/model-bearing experiment."

completion:
  proxy_l4_completion_required_for:
    - proxy_model_run
    - model_bearing_research_run
    - trade_decision_surface
    - diagnostic_score_surface_intended_for_model_follow_through
  required_period_roles:
    - validation
    - research_oos
  required_report_status: completed
  runtime_probe_completed_requires_all_required_period_roles: true
  runtime_probe_completed_requires_period_profile_id: true
  runtime_probe_completed_requires_runtime_period_set_id: true
  runtime_probe_completed_requires_execution_profile_id: true
  runtime_probe_completed_requires_surface_contract: true
  allowed_surface_scopes_for_completion:
    - full_period_deterministic
    - full_period_sparse_decision_surface
  forbidden_source_artifact_roles_for_completion:
    - diagnostic_sample
    - proxy_score_sample
    - score_sample
    - sampled_rows
    - preview_rows
  l4_good_to_l5_rule: "When L4 validation and research_oos reports remain promising for the declared surface, open L5_candidate_runtime_evidence instead of stopping at proxy or L4 observation."
  proxy_runtime_parity_completion_requires:
    - shared_contract
    - known_differences
    - interpretation_drift_risks
    - minimum_reconciliation_attempt
    - unit_semantics
    - comparison_class
    - divergence_judgment
    - prevention_memory
    - follow_up_action
execution:
  profile_ref: configs/mt5/tester_execution_profile_v0.yaml
  terminal_mode: portable_required
  required_terminal_args:
    - /portable
exception_profiles:
  materialization_smoke:
    completion_claim_allowed: false
    reason_code: materialization_smoke_only
  debug_reproduction:
    completion_claim_allowed: false
    reason_code: debug_reproduction_only
  specific_period_probe:
    completion_claim_allowed: false
    reason_code: explicit_specific_period_only
  regime_slice_probe:
    completion_claim_allowed: false
    reason_code: explicit_regime_slice_only
  source_replay:
    completion_claim_allowed: false
    reason_code: historical_source_replay_only
