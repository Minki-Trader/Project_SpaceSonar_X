name: control-plane

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  ci-scope-gate:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            ADVISORY="--advisory"
          fi
          python foundation/validation/ci_scope_gate.py --repo-root . --base "$BASE" --head "$HEAD" --repository "$GITHUB_REPOSITORY" --token "${{ github.token }}" ${ADVISORY:-}

  control-plane-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev --extra onnxlab
      - run: uv run python foundation/validation/policy_duplicate_lint.py --repo-root .
      - run: uv run python foundation/validation/routing_contract_lint.py --repo-root .
      - run: uv run python foundation/validation/routing_behavior_eval.py --repo-root .
      - run: uv run python foundation/validation/remote_repository_settings_verifier.py --repo-root . --check
      - run: uv run python -m spacesonar.cli registry project --check
      - run: git diff --check

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev --extra onnxlab
      - run: uv run pytest tests/test_runtime_completion_contract.py tests/test_wave01_runtime_truth_migration.py tests/control_plane tests/test_routing_behavior.py -q

  evidence-graph-full:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev --extra onnxlab
      - run: uv run python foundation/validation/control_plane_validator.py --repo-root .
      - run: uv run python foundation/validation/active_record_validator.py --repo-root .
      - run: uv run python -m spacesonar.cli project validate
