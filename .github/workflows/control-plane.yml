name: control-plane

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  ci-scope-gate:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          python foundation/validation/ci_scope_gate.py --repo-root . --base "$BASE" --head "$HEAD" --repository "$GITHUB_REPOSITORY" --token "${{ github.token }}"

  control-plane-fast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev --extra onnxlab
      - run: uv run python foundation/validation/policy_duplicate_lint.py --repo-root .
      - run: uv run python foundation/validation/routing_contract_lint.py --repo-root .
      - run: uv run python foundation/validation/operational_stability_lint.py --repo-root .
      - run: uv run python foundation/validation/routing_behavior_eval.py --repo-root .
      - run: uv run python foundation/validation/remote_repository_settings_verifier.py --repo-root . --check
      - run: uv run python -m spacesonar.cli registry project --check
      - run: git diff --check

  non-pytest-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev --extra onnxlab
      - run: uv run python -m compileall foundation/validation src/spacesonar
      - run: |
          uv run python - <<'PY'
          from pathlib import Path
          import yaml

          paths = [
              "AGENTS.md",
              "docs/agent_control/operational_stability_kernel.yaml",
              "docs/agent_control/writer_scope_operating_contract.yaml",
              "docs/agent_control/codex_operating_format.yaml",
              "docs/agent_control/policy_contract.yaml",
              "docs/agent_control/work_family_registry.yaml",
              "docs/workspace/lab_profile.yaml",
          ]
          for rel in paths:
              path = Path(rel)
              text = path.read_text(encoding="utf-8-sig")
              if path.suffix in {".yaml", ".yml"}:
                  payload = yaml.safe_load(text)
                  if not isinstance(payload, dict):
                      raise SystemExit(f"{rel}: expected mapping")
          print("writer scope smoke passed")
          PY
