name: full-regression

on:
  workflow_dispatch:
    inputs:
      archive_reason:
        description: "Why archive-level pytest evidence is needed"
        required: true
        type: string
      acknowledge_not_default:
        description: "Confirm this is not routine run-loop validation"
        required: true
        default: false
        type: boolean

jobs:
  full-regression:
    if: ${{ inputs.acknowledge_not_default == true }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --locked --extra dev --extra onnxlab
      - run: uv run pytest -q
